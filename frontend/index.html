<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sistema de Incidencias</title>
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
<script>
    const token = localStorage.getItem('auth_token');
    if (token) {
        try {
            const u = JSON.parse(localStorage.getItem('auth_user') || '{}');
            const role = (u.roles && u.roles.length) ? u.roles[0].codigo : null;
            const dest = { CIUDADANO:'ciudadano/home.html', TECNICO:'tecnico/panel.html',
                           SUPERVISOR:'supervisor/panel.html', ADMIN:'admin/panel.html' };
            window.location.replace(dest[role] || 'login.html');
        } catch { window.location.replace('login.html'); }
    } else {
        window.location.replace('login.html');
    }
</script>
</body>
</html>
