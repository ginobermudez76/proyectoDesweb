<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sistema de Incidencias</title>
    <link href="css/style.css" rel="stylesheet">
    <script src="/js/colors.js"></script>
</head>
<body>
<script>
    const token = localStorage.getItem('auth_token');
    if (token) {
        try {
            const u = JSON.parse(localStorage.getItem('auth_user') || '{}');
            const role = (u.roles && u.roles.length) ? u.roles[0].codigo : null;
            const dest = {
                CIUDADANO: '/pages/incidencias/panel.html',
                TECNICO: '/pages/incidencias/panel.html',
                SUPERVISOR: '/pages/incidencias/panel.html',
                ADMIN: '/pages/dashboard/dashboard.html'
            };
            window.location.replace(dest[role] || '/login.html');
        } catch { window.location.replace('/login.html'); }
    } else {
        window.location.replace('/login.html');
    }
</script>
</body>
</html>
