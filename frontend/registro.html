<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registro de Ciudadano — Sistema de Incidencias</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <script src="/js/colors.js"></script>
    <script src="/js/toast.js"></script>
    <style>
        .register-container {
            max-width: 520px;
            margin: 40px auto;
            background: var(--white);
            border-radius: 20px;
            padding: 30px 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        .register-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--gray-900);
            text-align: center;
            margin-bottom: 6px;
        }
        .register-subtitle {
            font-size: 13.5px;
            color: var(--gray-500);
            text-align: center;
            margin-bottom: 24px;
        }
        .phone-group {
            display: flex;
            gap: 8px;
        }
        .phone-prefix {
            width: 100px;
            flex-shrink: 0;
        }
        .form-row {
            display: flex;
            gap: 12px;
        }
        .form-row .form-group {
            flex: 1;
        }
        @media(max-width: 576px) {
            .register-container {
                margin: 20px 12px;
                padding: 20px 24px;
            }
            .form-row {
                flex-direction: column;
                gap: 0;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="register-container">
        <div class="register-title">Crear Cuenta</div>
        <div class="register-subtitle">Regístrate para reportar y dar seguimiento a incidencias</div>

        <div id="error-msg" class="error-msg"></div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label" for="nombres">Nombres</label>
                <input class="form-input" id="nombres" type="text" placeholder="Ej. Juan">
            </div>
            <div class="form-group">
                <label class="form-label" for="apellidos">Apellidos</label>
                <input class="form-input" id="apellidos" type="text" placeholder="Ej. Pérez">
            </div>
        </div>

        <div class="form-group">
            <label class="form-label" for="correo">Correo electrónico</label>
            <input class="form-input" id="correo" type="email" placeholder="juan.perez@ejemplo.com">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label" for="usuario">Nombre de usuario</label>
                <input class="form-input" id="usuario" type="text" placeholder="juan.perez">
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Contraseña</label>
                <input class="form-input" id="password" type="password" placeholder="Mín. 8 caracteres">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label" for="tipo_doc">Tipo de Documento</label>
                <select class="form-input" id="tipo_doc" onchange="onTipoDocChange()"></select>
            </div>
            <div class="form-group">
                <label class="form-label" for="documento">Nº de Documento</label>
                <input class="form-input" id="documento" type="text" placeholder="Ingresa tu documento">
            </div>
        </div>

        <div class="form-group">
            <label class="form-label" for="celular">Número de Celular</label>
            <div class="phone-group">
                <select class="form-input phone-prefix" id="prefijo_celular">
                    <option value="">Cargando…</option>
                </select>
                <input class="form-input flex-1" id="celular" type="tel" placeholder="999999999">
            </div>
        </div>

        <div class="form-group">
            <label class="form-label" for="pais">País</label>
            <select class="form-input" id="pais" onchange="onPaisChange()">
                <option value="">Cargando países…</option>
            </select>
        </div>

        <div class="form-row">
            <div class="form-group" id="estadoGroup">
                <label class="form-label" for="estado">Estado / Provincia</label>
                <select class="form-input" id="estado" onchange="onEstadoChange()">
                    <option value="">Selecciona un país primero</option>
                </select>
            </div>
            <div class="form-group" id="ciudadGroup">
                <label class="form-label" for="ciudad">Ciudad</label>
                <select class="form-input" id="ciudad">
                    <option value="">Selecciona una provincia primero</option>
                </select>
            </div>
        </div>

        <button class="btn-orange mt-3" id="registerBtn" onclick="doRegister()">
            <i class="bi bi-person-plus-fill"></i> Registrarme
        </button>

        <div style="text-align:center;margin-top:16px">
            <span class="text-muted-sm">¿Ya tienes cuenta? </span>
            <a href="login.html" style="font-size:13.5px;color:var(--orange);font-weight:600;text-decoration:none">
                Inicia sesión aquí
            </a>
        </div>
    </div>
</div>

<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script>
    let tiposDoc = [];
    let countriesData = [];

    // Cargar tipos de documentos y cascada de ubicación al iniciar
    async function initForm() {
        await cargarTiposDocumento();
        await cargarUbicacionBase();
        await detectarUbicacionIP();
    }

    async function cargarTiposDocumento() {
        try {
            tiposDoc = await apiFetch('/documentos/tipos');
            const select = document.getElementById('tipo_doc');
            select.innerHTML = tiposDoc.map(t => `<option value="${t.id}">${t.label}</option>`).join('');
            onTipoDocChange();
        } catch (e) {
            console.error('Error al cargar tipos de documento:', e);
        }
    }

    function onTipoDocChange() {
        const select = document.getElementById('tipo_doc');
        const docInput = document.getElementById('documento');
        const selectedId = parseInt(select.value);
        const selected = tiposDoc.find(t => t.id === selectedId);
        
        if (selected && selected.validacion) {
            docInput.placeholder = selected.validacion.error_msg || `Ingresa tu ${selected.label}`;
        }
    }

    async function cargarUbicacionBase() {
        try {
            // 1. Obtener todos los países con sus dialCodes de countriesnow
            const res = await fetch('https://countriesnow.space/api/v0.1/countries/info?returns=dialCode,unicodeFlag');
            const data = await res.json();
            
            if (data && !data.error) {
                countriesData = data.data;

                // Cargar selectores de país
                const paisSelect = document.getElementById('pais');
                paisSelect.innerHTML = '<option value="">Selecciona tu país</option>' + 
                    countriesData.map(c => `<option value="${c.name}" data-code="${c.unicodeFlag}">${c.unicodeFlag || ''} ${c.name}</option>`).join('');

                // Cargar selectores de prefijo celular
                const prefixSelect = document.getElementById('prefijo_celular');
                prefixSelect.innerHTML = countriesData
                    .filter(c => c.dialCode)
                    .map(c => `<option value="${c.dialCode}">${c.dialCode} (${c.name})</option>`).join('');
            }
        } catch (e) {
            console.error('Error al cargar API de países:', e);
            fallbackUbicacionInputs();
        }
    }

    async function detectarUbicacionIP() {
        try {
            const res = await fetch('https://freeipapi.com/api/json');
            const ipData = await res.json();
            
            if (ipData && ipData.countryName) {
                // Auto-seleccionar país
                const paisSelect = document.getElementById('pais');
                paisSelect.value = ipData.countryName;
                onPaisChange(ipData.regionName, ipData.cityName);

                // Auto-seleccionar prefijo
                const countryObj = countriesData.find(c => c.name.toLowerCase() === ipData.countryName.toLowerCase());
                if (countryObj) {
                    document.getElementById('prefijo_celular').value = countryObj.dialCode;
                }
            }
        } catch (e) {
            console.warn('No se pudo autodetectar ubicación IP:', e);
        }
    }

    function fallbackUbicacionInputs() {
        // En caso de que falle el API externo, reemplazamos por inputs de texto normales para no bloquear el formulario
        document.getElementById('pais').outerHTML = `<input class="form-input" id="pais" type="text" placeholder="Ingresa tu país">`;
        document.getElementById('estadoGroup').innerHTML = `
            <label class="form-label" for="estado">Estado / Provincia</label>
            <input class="form-input" id="estado" type="text" placeholder="Estado / Provincia">`;
        document.getElementById('ciudadGroup').innerHTML = `
            <label class="form-label" for="ciudad">Ciudad</label>
            <input class="form-input" id="ciudad" type="text" placeholder="Ciudad">`;
        document.getElementById('prefijo_celular').innerHTML = `
            <option value="+593">+593 (EC)</option>
            <option value="+1">+1 (US)</option>
            <option value="+57">+57 (CO)</option>`;
    }

    async function onPaisChange(preSelectEstado = '', preSelectCiudad = '') {
        const country = document.getElementById('pais').value;
        const estadoSelect = document.getElementById('estado');
        const ciudadSelect = document.getElementById('ciudad');
        
        if (!country) return;
        
        estadoSelect.innerHTML = '<option value="">Cargando provincias…</option>';
        ciudadSelect.innerHTML = '<option value="">Selecciona una provincia primero</option>';

        try {
            const res = await fetch('https://countriesnow.space/api/v0.1/countries/states', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ country })
            });
            const data = await res.json();
            
            if (data && !data.error && data.data.states.length > 0) {
                estadoSelect.innerHTML = '<option value="">Selecciona provincia</option>' +
                    data.data.states.map(s => `<option value="${s.name}">${s.name}</option>`).join('');
                
                if (preSelectEstado) {
                    estadoSelect.value = preSelectEstado;
                    onEstadoChange(preSelectCiudad);
                }
            } else {
                // Fallback a input de texto si no tiene estados registrados
                document.getElementById('estadoGroup').innerHTML = `
                    <label class="form-label" for="estado">Estado / Provincia</label>
                    <input class="form-input" id="estado" type="text" placeholder="Ingresa tu provincia" oninput="onEstadoTextInputChange()">`;
                document.getElementById('ciudadGroup').innerHTML = `
                    <label class="form-label" for="ciudad">Ciudad</label>
                    <input class="form-input" id="ciudad" type="text" placeholder="Ingresa tu ciudad">`;
            }
        } catch (e) {
            console.error('Error al cargar provincias:', e);
        }
    }

    async function onEstadoChange(preSelectCiudad = '') {
        const country = document.getElementById('pais').value;
        const state = document.getElementById('estado').value;
        const ciudadSelect = document.getElementById('ciudad');

        if (!state) return;
        ciudadSelect.innerHTML = '<option value="">Cargando ciudades…</option>';

        try {
            const res = await fetch('https://countriesnow.space/api/v0.1/countries/state/cities', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ country, state })
            });
            const data = await res.json();

            if (data && !data.error && data.data.length > 0) {
                ciudadSelect.innerHTML = '<option value="">Selecciona ciudad</option>' +
                    data.data.map(c => `<option value="${c}">${c}</option>`).join('');
                
                if (preSelectCiudad) {
                    ciudadSelect.value = preSelectCiudad;
                }
            } else {
                // Fallback a input de texto para ciudad
                document.getElementById('ciudadGroup').innerHTML = `
                    <label class="form-label" for="ciudad">Ciudad</label>
                    <input class="form-input" id="ciudad" type="text" placeholder="Ingresa tu ciudad">`;
            }
        } catch (e) {
            console.error('Error al cargar ciudades:', e);
        }
    }

    function onEstadoTextInputChange() {
        // Si el estado es un input de texto libre, la ciudad también debe ser input de texto libre
        const ciudadEl = document.getElementById('ciudad');
        if (ciudadEl && ciudadEl.tagName === 'SELECT') {
            document.getElementById('ciudadGroup').innerHTML = `
                <label class="form-label" for="ciudad">Ciudad</label>
                <input class="form-input" id="ciudad" type="text" placeholder="Ingresa tu ciudad">`;
        }
    }

    async function doRegister() {
        const btn = document.getElementById('registerBtn');
        const errEl = document.getElementById('error-msg');
        errEl.style.display = 'none';

        const nombres = document.getElementById('nombres').value.trim();
        const apellidos = document.getElementById('apellidos').value.trim();
        const correo = document.getElementById('correo').value.trim();
        const usuario = document.getElementById('usuario').value.trim();
        const password = document.getElementById('password').value;
        const id_tipo_documento = parseInt(document.getElementById('tipo_doc').value);
        const documento = document.getElementById('documento').value.trim();
        const prefijo = document.getElementById('prefijo_celular').value;
        const celular = document.getElementById('celular').value.trim();
        
        const pais = document.getElementById('pais').value;
        const estado = document.getElementById('estado').value;
        const ciudad = document.getElementById('ciudad').value;

        if (!nombres || !apellidos || !correo || !usuario || !password || !documento || !celular || !pais || !estado || !ciudad) {
            errEl.textContent = 'Por favor, completa todos los campos del formulario.';
            errEl.style.display = 'block';
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<i class="bi bi-arrow-clockwise"></i> Registrando…';

        // Estructura de la jerarquía de ubicación para MongoDB
        const ubicacionJson = {
            pais: pais,
            provincia_estado: estado,
            ciudad: ciudad
        };

        try {
            const data = await apiFetch('/register', {
                method: 'POST',
                body: JSON.stringify({
                    nombres,
                    apellidos,
                    correo_electronico: correo,
                    nombre_usuario: usuario,
                    password,
                    id_tipo_documento,
                    documento,
                    celular,
                    prefijo_celular: prefijo,
                    codigo_pais: pais,
                    ubicacion: ubicacionJson
                })
            });

            // Guardar credenciales de sesión en localStorage
            localStorage.setItem('auth_token', data.access_token);
            localStorage.setItem('auth_user', JSON.stringify(data.usuario));

            showToast('Cuenta creada con éxito. ¡Bienvenido!', 'success');

            // Redirigir al panel principal
            setTimeout(() => {
                window.location.href = '/pages/incidencias/panel.html';
            }, 1000);

        } catch (e) {
            errEl.textContent = e.message || 'Error al completar el registro.';
            errEl.style.display = 'block';
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-person-plus-fill"></i> Registrarme';
        }
    }

    initForm();
</script>
</body>
</html>
