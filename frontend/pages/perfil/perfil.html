<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Mi perfil de usuario" />
    <title>Mi Perfil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="/css/style.css" rel="stylesheet" />
    <script src="/js/colors.js"></script>
    <style>
      .avatar-wrapper {
        position: relative;
        display: inline-block;
        cursor: pointer;
        margin-bottom: 12px;
      }
      .avatar-circle {
        width: 84px;
        height: 84px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 32px;
        color: white;
        background-color: var(--orange, #f97316);
        background-position: center;
        background-size: cover;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        transition: opacity 0.2s ease;
      }
      .avatar-wrapper:hover .avatar-circle {
        opacity: 0.85;
      }
      .avatar-overlay {
        position: absolute;
        bottom: 0;
        right: 0;
        background: white;
        color: var(--gray-900);
        width: 28px;
        height: 28px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        transition: transform 0.2s;
      }
      .avatar-wrapper:hover .avatar-overlay {
        transform: scale(1.1);
        color: var(--orange);
      }
    </style>
  </head>
  <body>
    <div class="app-container">
      <div class="app-header" style="justify-content: center; border-bottom: none">
        <h5>Mi Perfil</h5>
      </div>

      <div class="section" style="text-align: center; padding-top: 8px">
        <div class="avatar-wrapper" onclick="document.getElementById('avatarInput').click()">
          <div class="avatar-circle" id="avatarEl"></div>
          <div class="avatar-overlay"><i class="bi bi-camera-fill"></i></div>
        </div>
        <input type="file" id="avatarInput" accept="image/png, image/jpeg, image/webp" style="display: none" onchange="uploadAvatar(event)">
        
        <div style="font-size: 18px; font-weight: 700; color: var(--gray-900)" id="nombreEl">…</div>
        <div class="text-muted-sm" id="rolLabel">…</div>
      </div>

      <div class="card-white mx-3 mb-3">
        <div class="profile-stats">
          <div class="stat-item">
            <div class="stat-value" id="totalEl">—</div>
            <div class="stat-label">Total incidencias</div>
          </div>
          <div class="stat-item">
            <div class="stat-value green" id="resueltasEl">—</div>
            <div class="stat-label">Resueltas</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" style="color: #ef4444" id="urgentesEl">—</div>
            <div class="stat-label">Urgentes</div>
          </div>
        </div>
      </div>

      <div class="section" style="padding-top: 0">
        <div class="menu-list">
          <a class="menu-item" onclick="abrirModalEdicion()" style="cursor: pointer;">
            <div class="menu-left"><i class="bi bi-person-lines-fill lead"></i> Editar datos personales</div>
            <i class="bi bi-chevron-right arrow"></i>
          </a>
          <a class="menu-item">
            <div class="menu-left"><i class="bi bi-bell lead"></i> Notificaciones</div>
            <i class="bi bi-chevron-right arrow"></i>
          </a>
          <a href="sesiones.html" class="menu-item">
            <div class="menu-left"><i class="bi bi-shield-lock lead"></i> Historial de sesiones</div>
            <i class="bi bi-chevron-right arrow"></i>
          </a>
        </div>
      </div>

      <div class="section" style="padding-top: 0">
        <button class="btn-red" onclick="confirmLogout('../../')">
          <i class="bi bi-box-arrow-right"></i> Cerrar sesión
        </button>
      </div>
    </div>

    <!-- MODAL PARA EDITAR DATOS PERSONALES -->
    <div class="modal fade" id="modalEditarPerfil" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="border-radius: 12px; border: none; padding: 10px;">
          <div class="modal-header border-0">
            <h5 class="modal-title fw-bold">Editar Datos Personales</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <form id="formEditarPerfil" onsubmit="guardarPerfil(event)">
              <div class="mb-3">
                <label class="form-label text-muted small fw-bold">Nombres</label>
                <input type="text" class="form-control" id="editNombres" required>
              </div>
              <div class="mb-3">
                <label class="form-label text-muted small fw-bold">Apellidos</label>
                <input type="text" class="form-control" id="editApellidos" required>
              </div>
              <div class="mb-3">
                <label class="form-label text-muted small fw-bold">Nombre de Usuario</label>
                <input type="text" class="form-control" id="editNombreUsuario" required>
              </div>
              <div class="mb-3">
                <label class="form-label text-muted small fw-bold">Correo Electrónico</label>
                <input type="email" class="form-control" id="editCorreo" required>
              </div>
              <div class="mb-3">
                <label class="form-label text-muted small fw-bold">Cédula / Documento (No modificable)</label>
                <input type="text" class="form-control bg-light" id="editDocumento" disabled readonly>
                <div class="form-text text-muted" style="font-size: 11px;">Por seguridad, la cédula no puede ser alterada.</div>
              </div>
              <div class="mb-3">
                <label class="form-label text-muted small fw-bold">Número de Celular</label>
                <input type="text" class="form-control" id="editCelular">
              </div>
              <div class="mb-3">
                <label class="form-label text-muted small fw-bold">Nueva Contraseña (Opcional)</label>
                <input type="password" class="form-control" id="editPassword" placeholder="Dejar en blanco para conservar la actual">
              </div>
              <div class="d-grid mt-4">
                <button type="submit" class="btn btn-primary" style="background-color: var(--orange, #f97316); border: none;">Guardar Cambios</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/toast.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/modal.js"></script>
    <script>
      if (!requireAuth()) throw new Error('Redirigiendo');

      const ROL_LABELS = {
        CIUDADANO: 'Ciudadano',
        TECNICO: 'Técnico de Incidencias',
        SUPERVISOR: 'Supervisor de Incidencias',
        ADMIN: 'Administrador del Sistema',
      };

      let modalEditar;
      document.addEventListener('DOMContentLoaded', () => {
        modalEditar = new bootstrap.Modal(document.getElementById('modalEditarPerfil'));
        cargarDatosVista();
      });

      function cargarDatosVista() {
        const userObj = JSON.parse(localStorage.getItem('auth_user')) || {};
        const avatarEl = document.getElementById('avatarEl');
        
        if (userObj.foto_perfil) {
          avatarEl.style.backgroundImage = `url('${userObj.foto_perfil}')`;
          avatarEl.textContent = ''; 
        } else {
          avatarEl.textContent = getUserInitials();
        }
        
        document.getElementById('nombreEl').textContent = (userObj.nombres && userObj.apellidos) ? `${userObj.nombres} ${userObj.apellidos}` : getUserName();
        document.getElementById('rolLabel').textContent = ROL_LABELS[getRole()] || getRole() || '—';
      }

      function abrirModalEdicion() {
        const userObj = JSON.parse(localStorage.getItem('auth_user')) || {};
        document.getElementById('editNombres').value = userObj.nombres || '';
        document.getElementById('editApellidos').value = userObj.apellidos || '';
        document.getElementById('editNombreUsuario').value = userObj.nombre_usuario || '';
        document.getElementById('editCorreo').value = userObj.correo_electronico || '';
        document.getElementById('editDocumento').value = userObj.documento || 'No registrado';
        document.getElementById('editCelular').value = userObj.celular || '';
        document.getElementById('editPassword').value = '';
        
        modalEditar.show();
      }

      async function guardarPerfil(event) {
        event.preventDefault();

        const payload = {
          nombres: document.getElementById('editNombres').value,
          apellidos: document.getElementById('editApellidos').value,
          nombre_usuario: document.getElementById('editNombreUsuario').value,
          correo_electronico: document.getElementById('editCorreo').value,
          celular: document.getElementById('editCelular').value,
        };

        const pass = document.getElementById('editPassword').value;
        if (pass.trim() !== '') {
          payload.password = pass;
        }

        showToast('Guardando cambios...', 'info');

        try {
          const token = localStorage.getItem('auth_token');
          const response = await fetch('/api/perfil/actualizar', {
            method: 'PUT',
            headers: {
              'Content-Type': 'application/json',
              'Accept': 'application/json',
              'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify(payload)
          });

          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.message || 'Error al actualizar los datos');
          }

          let userObj = JSON.parse(localStorage.getItem('auth_user')) || {};
          userObj = { ...userObj, ...data.user };
          localStorage.setItem('auth_user', JSON.stringify(userObj));

          modalEditar.hide();
          cargarDatosVista();
          showToast('Datos actualizados con éxito', 'success');
        } catch (error) {
          console.error(error);
          showToast(error.message, 'error');
        }
      }

      async function uploadAvatar(event) {
        const file = event.target.files[0];
        if (!file) return;

        const maxSize = 20 * 1024 * 1024;
        if (file.size > maxSize) {
            showToast('La imagen supera los 20MB permitidos.', 'error');
            event.target.value = ''; 
            return;
        }

        const formData = new FormData();
        formData.append('avatar', file);

        showToast('Subiendo foto y optimizando...', 'info');

        try {
            const token = localStorage.getItem('auth_token');
            const response = await fetch('/api/perfil/avatar', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`
                },
                body: formData
            });

            if (!response.ok) {
                const err = await response.json();
                throw new Error(err.message || 'Error al guardar la imagen');
            }

            const data = await response.json();
            
            const avatarEl = document.getElementById('avatarEl');
            avatarEl.style.backgroundImage = `url('${data.url}')`;
            avatarEl.textContent = ''; 

            let userObj = JSON.parse(localStorage.getItem('auth_user')) || {};
            if(userObj) {
                userObj.foto_perfil = data.url;
                localStorage.setItem('auth_user', JSON.stringify(userObj));
            }

            showToast('Foto actualizada con éxito', 'success');
        } catch (error) {
            console.error(error);
            showToast(error.message, 'error');
        } finally {
            event.target.value = ''; 
        }
      }

      async function cargarStats() {
        try {
          const data = await apiFetch('/incidencias');
          document.getElementById('totalEl').textContent = data.length;
          document.getElementById('resueltasEl').textContent = data.filter(i => i.estado === 'Resuelta').length;
          document.getElementById('urgentesEl').textContent = data.filter(i => i.prioridad === 'Urgente').length;
        } catch (error) {
          console.error('No se pudieron cargar las estadísticas del perfil:', error);
        }
      }
      cargarStats();
    </script>
  </body>
</html>
