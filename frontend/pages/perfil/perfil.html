<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Mi perfil de usuario" />
    <title>Mi Perfil</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      integrity="sha384-XVE0LqdyWESihx0laEzd3gYh4gI9YLsp5MTNQeSEvlZy1MIPUdVADmaCwgbqi3Hz"
      crossorigin="anonymous"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
      rel="stylesheet"
    />
    <link href="/css/style.css" rel="stylesheet" />
    <script src="/js/colors.js"></script>
</head>
<body>
<div class="app-container">

    <div class="app-header" style="justify-content:space-between;border-bottom:none">
        <div style="width:22px;visibility:hidden" aria-hidden="true"><i class="bi bi-x" style="font-size:22px"></i></div>
        <h5>Mi Perfil</h5>
        <i class="bi bi-bell" style="font-size:22px;color:var(--gray-400)"></i>
    </div>

      <div class="section" style="text-align: center; padding-top: 8px">
        <div class="avatar-circle" id="avatarEl" style="background: #8b5cf6">?</div>
        <div style="font-size: 18px; font-weight: 700; color: var(--gray-900)" id="nombreEl">…</div>
        <div class="text-muted-sm" id="rolLabel">…</div>
      </div>

    <!-- Estadísticas: rol genérico (ciudadano/supervisor/admin) -->
    <div class="card-white mx-3 mb-3" id="statsDefault">
        <div class="profile-stats">
          <div class="stat-item">
            <div class="stat-value" id="totalEl">—</div>
            <div class="stat-label">Total incidencias</div>
          </div>
          <div class="stat-item">
            <div class="stat-value green" id="resueltasEl">—</div>
            <div class="stat-label">Resueltas</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" style="color: #ef4444" id="urgentesEl">—</div>
            <div class="stat-label">Urgentes</div>
          </div>
        </div>
      </div>

    <!-- Estadísticas: técnico -->
    <div class="card-white mx-3 mb-3" id="statsTecnico" style="display:none">
        <div class="profile-stats">
            <div class="stat-item">
                <div class="stat-value" id="asignadasHoyEl">—</div>
                <div class="stat-label">Asignadas hoy</div>
            </div>
            <div class="stat-item">
                <div class="stat-value green" id="resueltasTecEl">—</div>
                <div class="stat-label">Resueltas</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" style="color:var(--accent-text)" id="tiempoPromEl">—</div>
                <div class="stat-label">Tiempo prom.</div>
            </div>
        </div>
    </div>

    <div class="section" style="padding-top:0">
        <div class="menu-list">
            <a class="menu-item" onclick="abrirNotificaciones(event)">
                <div class="menu-left"><i class="bi bi-bell lead"></i> Notificaciones</div>
                <i class="bi bi-chevron-right arrow"></i>
            </a>
            <a href="sesiones.html" class="menu-item">
                <div class="menu-left"><i class="bi bi-shield-lock lead"></i> Historial de sesiones</div>
                <i class="bi bi-chevron-right arrow"></i>
            </a>
            <a class="menu-item" onclick="abrirAyuda()">
                <div class="menu-left"><i class="bi bi-question-circle lead"></i> Ayuda y soporte</div>
                <i class="bi bi-chevron-right arrow"></i>
            </a>
        </div>
    </div>

      <div class="section" style="padding-top: 0">
        <button class="btn-red" onclick="confirmLogout('../../')">
          <i class="bi bi-box-arrow-right"></i> Cerrar sesión
        </button>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="/js/app.js"></script>
    <script src="/js/toast.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/modal.js"></script>
    <script>
      if (!requireAuth()) throw new Error('Redirigiendo');

      const ROL_LABELS = {
        CIUDADANO: 'Ciudadano',
        TECNICO: 'Técnico de Incidencias',
        SUPERVISOR: 'Supervisor de Incidencias',
        ADMIN: 'Administrador del Sistema',
      };

      document.getElementById('avatarEl').textContent = getUserInitials();
      document.getElementById('nombreEl').textContent = getUserName();
      document.getElementById('rolLabel').textContent = ROL_LABELS[getRole()] || getRole() || '—';

async function cargarStats() {
    try {
        const data = await apiFetch('/incidencias');
        document.getElementById('totalEl').textContent     = data.length;
        document.getElementById('resueltasEl').textContent = data.filter(i => i.estado === 'Resuelta').length;
        document.getElementById('urgentesEl').textContent  = data.filter(i => i.prioridad === 'Urgente').length;
    } catch (error) {
        console.error('No se pudieron cargar las estadísticas del perfil:', error);
    }
}

/** Formatea minutos a una unidad legible (min / h / días). */
function formatDuracion(mins) {
    if (mins < 60) return `${mins}min`;
    const horas = Math.floor(mins / 60);
    if (horas < 24) return `${horas}h`;
    return `${Math.floor(horas / 24)}d`;
}

async function cargarStatsTecnico() {
    try {
        const data = await apiFetch('/perfil/stats-tecnico');
        document.getElementById('asignadasHoyEl').textContent = data.asignadas_hoy;
        document.getElementById('resueltasTecEl').textContent = data.resueltas;
        document.getElementById('tiempoPromEl').textContent =
            data.tiempo_promedio_minutos != null ? formatDuracion(data.tiempo_promedio_minutos) : '—';
    } catch (error) {
        console.error('No se pudieron cargar las estadísticas del técnico:', error);
    }
}

if (getRole() === 'TECNICO') {
    document.getElementById('statsDefault').style.display = 'none';
    document.getElementById('statsTecnico').style.display = '';
    cargarStatsTecnico();
} else {
    cargarStats();
}

/** Abre el panel de notificaciones (la misma campana del topbar). */
function abrirNotificaciones(event) {
    // Evita que el clic original siga hacia document y cierre el panel que
    // el clic sintético en la campana acaba de abrir (listener de "cerrar
    // al hacer clic afuera" en setupNotificationsUI()).
    event?.stopPropagation();
    document.querySelector('.bell-wrapper')?.click();
}

/** Modal estático de ayuda y soporte. */
function abrirAyuda() {
    showModal(
        'Ayuda y soporte',
        `<div style="font-size:14px;color:var(--gray-700);line-height:1.6">
            <p style="margin-bottom:10px">¿Tienes dudas o problemas usando la plataforma?</p>
            <p style="margin-bottom:10px">
                <i class="bi bi-envelope"></i> soporte@urbi.app<br>
                <i class="bi bi-telephone"></i> +593 99 999 9999
            </p>
            <p style="margin:0">Horario de atención: Lunes a Viernes, 8:00 a.m. – 5:00 p.m.</p>
        </div>`
    );
}
</script>
</body>
</html>
