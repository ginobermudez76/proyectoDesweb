<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Historial de sesiones del usuario" />
    <title>Historial de Sesiones</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      integrity="sha384-XGjxtQfXaH2tnPFa9x+ruJTuLE3Aa6LhHSWRr1XeTyhezb4abCG4ccI5AkVDxqC+"
      crossorigin="anonymous"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
      rel="stylesheet"
    />
    <link href="/css/style.css" rel="stylesheet" />
    <script src="/js/colors.js"></script>
    <script src="/js/toast.js"></script>
  </head>
  <body>
    <div class="app-container">
      <div class="app-header">
        <button class="back-btn" onclick="history.back()">
          <i class="bi bi-chevron-left"></i>
        </button>
        <h5>Historial de sesiones</h5>
        <div></div>
      </div>

      <div class="section" id="sesionesContainer">
        <div class="text-muted-sm text-center py-5">Cargando historial…</div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="/js/app.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/modal.js"></script>
    <script>
      if (!requireAuth()) throw new Error('Redirigiendo');

      async function cargarHistorial() {
        const container = document.getElementById('sesionesContainer');
        try {
          const sesiones = await apiFetch('/usuarios/sesiones');

          if (!sesiones || sesiones.length === 0) {
            container.innerHTML =
              '<div class="text-muted-sm text-center py-5">No se encontraron registros de sesión.</div>';
            return;
          }

          container.innerHTML = sesiones
            .map((s) => {
              const dateStr = s.fecha_hora
                ? new Date(s.fecha_hora).toLocaleString('es-ES', {
                    dateStyle: 'short',
                    timeStyle: 'short',
                  })
                : '—';

              // Etiqueta bonita para la acción
              const isLogin = s.accion === 'LOGIN';
              const actionBadge = isLogin
                ? '<span class="badge bg-success-subtle text-success border border-success-subtle px-2 py-1" style="font-size:11px">Ingreso</span>'
                : '<span class="badge bg-secondary-subtle text-secondary border border-secondary-subtle px-2 py-1" style="font-size:11px">Salida</span>';

              return `
                <div class="card-white p-3 mb-2" style="border-radius:12px; box-shadow:0 1px 3px rgba(0,0,0,.05)">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px">
                        ${actionBadge}
                        <span style="font-size:12px; color:var(--gray-400); font-weight:500">${dateStr}</span>
                    </div>
                    <div style="font-size:13px; color:var(--gray-700); margin-bottom:4px">
                        <i class="bi bi-laptop text-muted" style="margin-right:6px"></i>
                        <span style="font-weight:500">Dispositivo:</span>
                        <span style="word-break:break-all">${s.dispositivo || 'Desconocido'}</span>
                    </div>
                    <div style="font-size:13px; color:var(--gray-700)">
                        <i class="bi bi-globe text-muted" style="margin-right:6px"></i>
                        <span style="font-weight:500">Dirección IP:</span>
                        <code>${s.ip || '—'}</code>
                    </div>
                </div>
            `;
            })
            .join('');
        } catch (e) {
          console.error('No se pudo cargar el historial de sesiones:', e);
          container.innerHTML =
            '<div class="text-muted-sm text-center py-5">No se pudo cargar el historial de sesiones.</div>';
        }
      }

      cargarHistorial();
    </script>
  </body>
</html>
