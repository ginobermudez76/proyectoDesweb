<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Comunicados y avisos oficiales">
    <title>Comunicados</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" integrity="sha384-XGjxtQfXaH2tnPFa9x+ruJTuLE3Aa6LhHSWRr1XeTyhezb4abCG4ccI5AkVDxqC+" crossorigin="anonymous" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" integrity="sha384-XGjxtQfXaH2tnPFa9x+ruJTuLE3Aa6LhHSWRr1XeTyhezb4abCG4ccI5AkVDxqC+" crossorigin="anonymous" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <script src="/js/colors.js"></script>
    <script src="/js/toast.js"></script>
</head>
<body>
<div class="app-container">

    <div class="app-header">
        <button class="back-btn" onclick="history.back()"><i class="bi bi-chevron-left"></i></button>
        <h5>Comunicados</h5>
        <div></div>
    </div>

    <div class="section">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
            <div class="section-title" style="margin-bottom:0" id="countLabel">Comunicados</div>
            <!-- Botón "Nuevo" solo para ADMIN/SUPERVISOR -->
            <button id="btnNuevo" class="btn-orange"
                    style="display:none;width:auto;padding:8px 16px;font-size:13px;border-radius:10px"
                    onclick="nuevoComunicado()">
                <i class="bi bi-plus"></i> Nuevo
            </button>
        </div>

        <div id="lista"><div class="text-muted-sm text-center py-3">Cargando…</div></div>
    </div>

</div>

<!-- Modal nuevo comunicado -->
<div id="modalOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;align-items:center;justify-content:center;padding:16px">
    <div style="border-radius:20px;padding:24px;width:100%;max-width:430px;max-height:85vh;overflow-y:auto">
        <div style="font-size:16px;font-weight:700;margin-bottom:16px">Nuevo comunicado</div>
        <div class="form-group"><label class="form-label" for="pubTitulo">Título *</label>
            <input class="form-input" id="pubTitulo" placeholder="Ej: Corte de agua programado"></div>
        <div class="form-group"><label class="form-label" for="pubResumen">Resumen (opcional)</label>
            <input class="form-input" id="pubResumen" placeholder="Resumen breve para la lista"></div>
        <div class="form-group"><label class="form-label" for="pubContenido">Contenido *</label>
            <textarea class="form-input" id="pubContenido" rows="5" style="resize:vertical"
                      placeholder="Detalle completo del comunicado…"></textarea></div>
        <div class="form-group"><label class="form-label" for="pubEtiquetas">Etiquetas (opcional, separadas por coma)</label>
            <input class="form-input" id="pubEtiquetas" placeholder="Ej: vialidad, agua, mantenimiento"></div>
        <div id="modalError" class="error-msg" style="display:none;font-size:12px;margin-bottom:10px"></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px">
            <button class="btn-outline-gray" onclick="cerrarModal()">Cancelar</button>
            <button class="btn-orange" style="border-radius:12px" onclick="crearComunicado()">Publicar</button>
        </div>
    </div>
</div>

<!-- Modal editar comunicado -->
<div id="editModalOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;align-items:center;justify-content:center;padding:16px">
    <div style="border-radius:20px;padding:24px;width:100%;max-width:430px;max-height:85vh;overflow-y:auto">
        <div style="font-size:16px;font-weight:700;margin-bottom:16px">Editar comunicado</div>
        <input type="hidden" id="editId">
        <div class="form-group"><label class="form-label" for="editTitulo">Título *</label>
            <input class="form-input" id="editTitulo"></div>
        <div class="form-group"><label class="form-label" for="editResumen">Resumen (opcional)</label>
            <input class="form-input" id="editResumen"></div>
        <div class="form-group"><label class="form-label" for="editContenido">Contenido *</label>
            <textarea class="form-input" id="editContenido" rows="5" style="resize:vertical"></textarea></div>
        <div class="form-group"><label class="form-label" for="editEtiquetas">Etiquetas (opcional, separadas por coma)</label>
            <input class="form-input" id="editEtiquetas"></div>
        <div id="editModalError" class="error-msg" style="display:none;font-size:12px;margin-bottom:10px"></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px">
            <button class="btn-outline-gray" onclick="cerrarEdicion()">Cancelar</button>
            <button class="btn-orange" style="border-radius:12px" onclick="guardarEdicion()">Guardar</button>
        </div>
    </div>
</div>

<script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"
></script>
<script src="/js/app.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/modal.js"></script>
<script>
    if (!requireAuth()) throw new Error('Redirigiendo');

    const puedeGestionar = getOpciones().some(o => o.includes('Publicaciones'));
    if (puedeGestionar) {
        document.getElementById('btnNuevo').style.display = '';
    }

    /** Trunca texto largo para la vista previa en la tarjeta. */
    function truncar(texto, max = 160) {
        if (!texto) return '';
        return texto.length > max ? texto.slice(0, max).trim() + '…' : texto;
    }

    function etiquetasHTML(etiquetas) {
        if (!Array.isArray(etiquetas) || !etiquetas.length) return '';
        return `<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px">${
            etiquetas.map(e => `<span class="role-badge" style="background:var(--bg-orange-light);color:var(--accent-text)">${e}</span>`).join('')
        }</div>`;
    }

    let publicaciones = [];

    async function cargar() {
        try {
            publicaciones = await apiFetch('/publicaciones');
            document.getElementById('countLabel').textContent = `Comunicados (${publicaciones.length})`;
            marcarComunicadosVistos(publicaciones);

            document.getElementById('lista').innerHTML = publicaciones.map(p => {
                const preview = p.resumen || truncar(p.contenido);
                const idSeguro = String(p.id).replace(/"/g, '');
                return `
                <div class="card-white">
                    <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
                        <div style="font-size:15px;font-weight:700;color:var(--gray-900)">${p.titulo}</div>
                        <div class="text-muted-sm" style="white-space:nowrap">${timeAgo(p.fecha_publicacion)}</div>
                    </div>
                    <p id="preview-${idSeguro}" style="font-size:14px;color:var(--gray-700);margin:8px 0 0;line-height:1.5;white-space:pre-line">${preview}</p>
                    <p id="full-${idSeguro}" style="display:none;font-size:14px;color:var(--gray-700);margin:8px 0 0;line-height:1.5;white-space:pre-line">${p.contenido}</p>
                    ${p.contenido && p.contenido.length > preview.length ? `
                    <button id="toggle-${idSeguro}" onclick="toggleContenido('${idSeguro}')"
                            style="background:none;border:none;padding:6px 0 0;color:var(--accent-text);font-size:13px;font-weight:600;cursor:pointer">
                        Leer más
                    </button>` : ''}
                    ${etiquetasHTML(p.etiquetas)}
                    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:10px">
                        <div class="text-muted-sm">Publicado por ${p.autor_nombre || 'Equipo Urbi'}</div>
                        ${puedeGestionar ? `
                        <div style="display:flex;gap:6px">
                            <button class="toggle-btn" style="border-color:var(--gray-400);color:var(--gray-400)"
                                    onclick="abrirEdicion('${idSeguro}')">Editar</button>
                            <button class="toggle-btn toggle-active" onclick="eliminarComunicado('${idSeguro}')">Eliminar</button>
                        </div>` : ''}
                    </div>
                </div>`;
            }).join('') || '<div class="text-muted-sm text-center py-3">No hay comunicados publicados todavía.</div>';
        } catch (err) {
            document.getElementById('lista').innerHTML =
                `<div class="text-danger text-center py-3">Error al cargar comunicados: ${err.message}</div>`;
        }
    }

    function toggleContenido(id) {
        const preview = document.getElementById(`preview-${id}`);
        const full = document.getElementById(`full-${id}`);
        const btn = document.getElementById(`toggle-${id}`);
        const expandido = full.style.display !== 'none';
        preview.style.display = expandido ? '' : 'none';
        full.style.display = expandido ? 'none' : '';
        btn.textContent = expandido ? 'Leer más' : 'Leer menos';
    }

    function nuevoComunicado() {
        ['pubTitulo', 'pubResumen', 'pubContenido', 'pubEtiquetas'].forEach(id => {
            document.getElementById(id).value = '';
        });
        document.getElementById('modalError').style.display = 'none';
        document.getElementById('modalOverlay').style.display = 'flex';
    }

    function cerrarModal() {
        document.getElementById('modalOverlay').style.display = 'none';
        document.getElementById('modalError').style.display = 'none';
    }

    async function crearComunicado() {
        const errEl = document.getElementById('modalError');
        errEl.style.display = 'none';

        const titulo = document.getElementById('pubTitulo').value.trim();
        const resumen = document.getElementById('pubResumen').value.trim();
        const contenido = document.getElementById('pubContenido').value.trim();
        const etiquetas = document.getElementById('pubEtiquetas').value
            .split(',').map(e => e.trim()).filter(Boolean);

        if (!titulo || !contenido) {
            errEl.textContent = 'Completa el título y el contenido.';
            errEl.style.display = 'block';
            return;
        }

        try {
            await apiFetch('/publicaciones', {
                method: 'POST',
                body: JSON.stringify({
                    titulo,
                    contenido,
                    resumen: resumen || null,
                    estado: 'Publicado',
                    etiquetas,
                }),
            });
            cerrarModal();
            showToast('Comunicado publicado correctamente', 'success');
            cargar();
        } catch (e) {
            errEl.textContent = e.message || 'No se pudo publicar el comunicado.';
            errEl.style.display = 'block';
        }
    }

    function abrirEdicion(id) {
        const p = publicaciones.find(x => String(x.id) === id);
        if (!p) return;
        document.getElementById('editId').value = p.id;
        document.getElementById('editTitulo').value = p.titulo || '';
        document.getElementById('editResumen').value = p.resumen || '';
        document.getElementById('editContenido').value = p.contenido || '';
        document.getElementById('editEtiquetas').value = (p.etiquetas || []).join(', ');
        document.getElementById('editModalError').style.display = 'none';
        document.getElementById('editModalOverlay').style.display = 'flex';
    }

    function cerrarEdicion() {
        document.getElementById('editModalOverlay').style.display = 'none';
        document.getElementById('editModalError').style.display = 'none';
    }

    async function guardarEdicion() {
        const errEl = document.getElementById('editModalError');
        errEl.style.display = 'none';

        const id = document.getElementById('editId').value;
        const titulo = document.getElementById('editTitulo').value.trim();
        const resumen = document.getElementById('editResumen').value.trim();
        const contenido = document.getElementById('editContenido').value.trim();
        const etiquetas = document.getElementById('editEtiquetas').value
            .split(',').map(e => e.trim()).filter(Boolean);

        if (!titulo || !contenido) {
            errEl.textContent = 'Completa el título y el contenido.';
            errEl.style.display = 'block';
            return;
        }

        try {
            await apiFetch(`/publicaciones/${id}`, {
                method: 'PUT',
                body: JSON.stringify({
                    titulo,
                    contenido,
                    resumen: resumen || null,
                    estado: 'Publicado',
                    etiquetas,
                }),
            });
            cerrarEdicion();
            showToast('Comunicado actualizado correctamente', 'success');
            cargar();
        } catch (e) {
            errEl.textContent = e.message || 'No se pudo actualizar el comunicado.';
            errEl.style.display = 'block';
        }
    }

    async function eliminarComunicado(id) {
        const confirmado = await showConfirmModal(
            'Eliminar comunicado',
            '¿Estás seguro de que deseas eliminar este comunicado permanentemente? Esta acción no se puede deshacer.',
            'Confirmar',
            'btn-danger'
        );
        if (!confirmado) return;

        try {
            await apiFetch(`/publicaciones/${id}`, { method: 'DELETE' });
            showToast('Comunicado eliminado correctamente', 'success');
            cargar();
        } catch (e) {
            showToast(e.message || 'No se pudo eliminar el comunicado.', 'error');
        }
    }

    cargar();
</script>
</body>
</html>
