<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Mapa de incidencias en tiempo real">
    <title>Mapa de incidencias</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../../css/style.css" rel="stylesheet">
    <style>
        body { padding-bottom:0; }
        .map-wrap { position:relative; height:calc(100vh - 62px); }
        #map { width:100%; height:100%; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="map-wrap">
        <div id="map"></div>
        <!-- Leyenda dinámica desde catálogos -->
        <div class="map-legend" id="mapLegend">
            <div style="font-weight:600;font-size:11px;margin-bottom:4px">Estado</div>
            <div class="text-muted-sm" style="font-size:10px">Cargando…</div>
        </div>
    </div>
</div>

<script src="../../js/app.js"></script>
<script src="../../js/auth.js"></script>
<script src="../../js/catalogos.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
if (!requireAuth()) throw new Error('Redirigiendo');

const map = L.map('map').setView([19.4326, -99.1332], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap',
}).addTo(map);

if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
        map.setView([pos.coords.latitude, pos.coords.longitude], 13);
    });
}

async function cargar() {
    try {
        const [data, cats] = await Promise.all([
            apiFetch('/incidencias'),
            getCatalogos(),
        ]);

        // Construir leyenda dinámica
        const legendHTML = cats.estados.map(e =>
            `<div><span class="legend-dot" style="background:${e.color_hex || '#9CA3AF'}"></span>${e.label}</div>`
        ).join('');
        document.getElementById('mapLegend').innerHTML =
            '<div style="font-weight:600;font-size:11px;margin-bottom:4px">Estado</div>' + legendHTML;

        // Mapear colores
        const colorMap = {};
        cats.estados.forEach(e => { colorMap[e.codigo] = e.color_hex || '#9CA3AF'; });

        data.forEach(inc => {
            if (!inc.ubicacion?.coordinates) return;
            const [lng, lat] = inc.ubicacion.coordinates;
            const color      = colorMap[inc.estado] || '#9CA3AF';
            const estInfo    = getEstadoInfo(inc.estado, cats.estados);
            const priInfo    = getPrioridadInfo(inc.prioridad, cats.prioridades);

            L.circleMarker([lat, lng], {
                radius: 11, color: '#fff', fillColor: color,
                fillOpacity: 0.9, weight: 2,
            }).addTo(map)
              .bindPopup(`
                <b>${inc.titulo}</b><br>
                <span style="color:${color}">${estInfo.label}</span> · ${priInfo.label || inc.prioridad || 'Media'}<br>
                <a href="detalle.html?id=${inc.id}">Ver detalle →</a>
              `);
        });
    } catch {}
}

cargar();
</script>
</body>
</html>
