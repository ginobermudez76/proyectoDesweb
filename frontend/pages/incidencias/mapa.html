<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Mapa de incidencias en tiempo real">
    <title>Mapa de incidencias</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <script src="/js/colors.js"></script>
    <style>
        body { padding-bottom:0; }
        .map-wrap { position:relative; height:calc(100vh - 62px); }
        #map { width:100%; height:100%; }
        .map-bottom-card {
            position:absolute; bottom:80px; left:16px; right:16px;
            background:#fff; border-radius:12px; padding:12px 16px;
            box-shadow:0 4px 12px rgba(0,0,0,.1); z-index:1000;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="map-wrap">
        <div id="map"></div>
        <!-- Leyenda dinÃ¡mica -->
        <div class="map-legend" id="mapLegend">
            <div style="font-weight:600;font-size:11px;margin-bottom:4px">Estado</div>
            <div class="text-muted-sm" style="font-size:10px">Cargandoâ€¦</div>
        </div>
        <!-- CTA Reportar (Solo visible para Ciudadanos) -->
        <div id="btnReportarWrap" style="display:none;position:absolute;bottom:80px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);z-index:1000">
            <button class="btn-orange" onclick="window.location.href='reportar.html'">
                <i class="bi bi-plus-circle"></i> Reportar incidencia
            </button>
        </div>
        <!-- Alerta Incidencia MÃ¡s Cercana (Solo visible para TÃ©cnicos) -->
        <div class="map-bottom-card" id="nearestCard" style="display:none">
            <div class="text-muted-sm" style="margin-bottom:4px">MÃS CERCANA ASIGNADA A MÃ</div>
            <div style="display:flex;align-items:center;gap:6px">
                <span class="legend-dot" id="nearestDot" style="width:12px;height:12px;border-radius:50%;display:inline-block"></span>
                <span style="font-size:14px;font-weight:600" id="nearestTitle">â€”</span>
                <span class="text-muted-sm" id="nearestDist"></span>
            </div>
        </div>
    </div>
</div>

<script src="/js/app.js"></script>
<script src="/js/toast.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/catalogos.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
if (!requireAuth()) throw new Error('Redirigiendo');

const user = getUser();
const role = getRole();

if (role === 'CIUDADANO') {
    document.getElementById('btnReportarWrap').style.display = 'block';
}

const map = L.map('map').setView([19.4326, -99.1332], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: 'Â© OpenStreetMap',
}).addTo(map);

function haversine([lat1,lng1],[lat2,lng2]) {
    const R=6371000, dLat=(lat2-lat1)*Math.PI/180, dLng=(lng2-lng1)*Math.PI/180;
    const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
    return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

let userPos = null;
if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
        userPos = [pos.coords.latitude, pos.coords.longitude];
        map.setView(userPos, 14);
        L.circleMarker(userPos, { radius:8, color: APP_COLORS.white, fillColor: APP_COLORS.blue, fillOpacity:1, weight:2 })
            .addTo(map).bindPopup('Tu ubicaciÃ³n');
        
        refrescarMasCercano();
    });
}

const PRIORIDAD_COLOR = APP_COLORS.prioridades;
let mapData = [];

async function cargar() {
    try {
        let [data, cats] = await Promise.all([
            apiFetch('/incidencias'),
            getCatalogos(),
        ]);

        mapData = data;

        // Mapear colores de estado
        const colorMap = {};
        cats.estados.forEach(e => { colorMap[e.codigo] = e.color_hex || '#9CA3AF'; });

        if (role === 'TECNICO') {
            // Filtrar solo asignadas al tÃ©cnico
            mapData = data.filter(inc => String(inc.asignado_a) === String(user.uuid));

            // Leyenda de prioridad
            document.getElementById('mapLegend').innerHTML = `
                <div style="font-weight:600;font-size:11px;margin-bottom:4px">Prioridad</div>
                <div><span class="legend-dot" style="background:var(--red)"></span>Urgente</div>
                <div><span class="legend-dot" style="background:var(--orange)"></span>Media</div>
                <div><span class="legend-dot" style="background:var(--blue)"></span>Baja</div>
            `;
        } else {
            // Leyenda dinÃ¡mica de estados
            const legendHTML = cats.estados.map(e =>
                `<div><span class="legend-dot" style="background:${e.color_hex || '#9CA3AF'}"></span>${e.label}</div>`
            ).join('');
            document.getElementById('mapLegend').innerHTML =
                '<div style="font-weight:600;font-size:11px;margin-bottom:4px">Estado</div>' + legendHTML;
        }

        mapData.forEach(inc => {
            if (!inc.ubicacion?.coordinates) return;
            const [lng, lat] = inc.ubicacion.coordinates;
            
            let color = '#9CA3AF';
            let descText = '';

            if (role === 'TECNICO') {
                color = PRIORIDAD_COLOR[inc.prioridad] || '#9CA3AF';
                descText = `${inc.prioridad || 'Media'}`;
            } else {
                color = colorMap[inc.estado] || '#9CA3AF';
                const estInfo = getEstadoInfo(inc.estado, cats.estados);
                const priInfo = getPrioridadInfo(inc.prioridad, cats.prioridades);
                descText = `<span style="color:${color}">${estInfo.label}</span> Â· ${priInfo.label || inc.prioridad || 'Media'}`;
            }

            L.circleMarker([lat, lng], {
                radius: 11, color: '#fff', fillColor: color,
                fillOpacity: 0.9, weight: 2,
            }).addTo(map)
              .bindPopup(`
                <b>${inc.titulo}</b><br>
                ${descText}<br>
                <a href="detalle.html?id=${inc.id}">Ver detalle â†’</a>
              `);
        });

        refrescarMasCercano();

      } catch (err) {
          console.error(err);
      }
  }

  function refrescarMasCercano() {
      if (role !== 'TECNICO' || !userPos || !mapData.length) return;
      
      let nearest = null, minDist = Infinity;
      mapData.forEach(inc => {
          if (!inc.ubicacion?.coordinates) return;
          const [lng, lat] = inc.ubicacion.coordinates;
          const d = haversine(userPos, [lat, lng]);
          if (d < minDist) {
              minDist = d;
              nearest = { inc, color: PRIORIDAD_COLOR[inc.prioridad] || '#9CA3AF' };
          }
      });

      if (nearest) {
          document.getElementById('nearestCard').style.display = 'block';
          document.getElementById('nearestDot').style.background = nearest.color;
          document.getElementById('nearestTitle').textContent = nearest.inc.titulo;
          const m = Math.round(minDist);
          document.getElementById('nearestDist').textContent = m >= 1000 ? `${(m / 1000).toFixed(1)} km` : `${m} m`;
          document.getElementById('nearestCard').onclick = () =>
              window.location.href = `detalle.html?id=${nearest.inc.id}`;
          document.getElementById('nearestCard').style.cursor = 'pointer';
      }
  }

  cargar();
  </script>
  </body>
  </html>
