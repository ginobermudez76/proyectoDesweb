<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Reportar una nueva incidencia urbana">
    <title>Reportar incidencia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <script src="/js/colors.js"></script>
</head>
<body>
<div class="app-container">

    <div class="app-header">
        <button class="back-btn" onclick="history.back()"><i class="bi bi-chevron-left"></i></button>
        <h5>Reportar incidencia</h5>
        <div></div>
    </div>

    <div class="section">

        <!-- Tipo de incidencia (cargado desde API) -->
        <div class="section-title">Tipo de incidencia</div>
        <div class="category-grid" id="tipoGrid" style="grid-template-columns:repeat(2,1fr)">
            <div class="text-muted-sm text-center" style="grid-column:span 2">Cargando tipos…</div>
        </div>

        <div id="subtipoWrap" style="display:none;margin-top:8px">
            <div class="section-title">Subtipo</div>
            <div class="category-grid" id="subtipoGrid"
                 style="grid-template-columns:repeat(auto-fit,minmax(80px,1fr))"></div>
        </div>

        <!-- Foto -->
        <label class="photo-upload" for="fotoInput">
            <i class="bi bi-camera"></i>
            <span id="photoLabel">Agregar foto</span>
            <div class="text-muted-sm">Opcional, ayuda a los operadores</div>
        </label>
        <input type="file" id="fotoInput" accept="image/*" style="display:none" onchange="onFotoChange(this)">

        <!-- Ubicación -->
        <div class="location-row">
            <div class="loc-text">
                <i class="bi bi-geo-alt-fill" style="color:var(--orange)"></i>
                <span id="locationText">Obteniendo ubicación…</span>
            </div>
            <a href="#" onclick="detectarUbicacion(); return false">Cambiar</a>
        </div>

        <!-- Descripción -->
        <div class="form-group">
            <label class="form-label">Descripción</label>
            <textarea class="form-input" id="descripcion" rows="4"
                placeholder="Describe el problema con más detalle…"></textarea>
        </div>

        <div id="error-msg" class="error-msg"></div>

        <button class="btn-orange" id="sendBtn" onclick="enviarReporte()">
            <i class="bi bi-send"></i> Enviar reporte
        </button>

    </div>
</div>

<script src="/js/app.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/catalogos.js"></script>
<script>
if (!requireCiudadano()) throw new Error('Redirigiendo');

let selectedTipo    = null;
let selectedTipoId  = null;
let selectedSub     = null;
let userLat         = null;
let userLng         = null;
let fotoFile        = null;

// ── Cargar tipos desde API ─────────────────────────────────────────────────
async function initTipos() {
    try {
        await renderTiposGrid('tipoGrid', (nombre, tipoId) => {
            selectedTipo   = nombre;
            selectedTipoId = tipoId;
            selectedSub    = null;
            document.getElementById('subtipoWrap').style.display = '';
            renderSubtiposDesdeId(tipoId);
        });
    } catch (e) {
        document.getElementById('tipoGrid').innerHTML =
            '<div class="text-muted-sm" style="grid-column:span 2">Error al cargar tipos.</div>';
    }
}

async function renderSubtiposDesdeId(tipoId) {
    await renderSubtiposGrid('subtipoGrid', tipoId, (sub) => {
        selectedSub = sub;
    });
}

function onFotoChange(input) {
    if (input.files.length) {
        fotoFile = input.files[0];
        document.getElementById('photoLabel').textContent = fotoFile.name;
    }
}

function detectarUbicacion() {
    document.getElementById('locationText').textContent = 'Detectando…';
    if (!navigator.geolocation) {
        document.getElementById('locationText').textContent = 'Geolocalización no disponible';
        return;
    }
    navigator.geolocation.getCurrentPosition(
        pos => {
            userLat = pos.coords.latitude;
            userLng = pos.coords.longitude;
            document.getElementById('locationText').textContent =
                `${userLat.toFixed(5)}, ${userLng.toFixed(5)}`;
        },
        () => {
            document.getElementById('locationText').textContent = 'No se pudo obtener ubicación';
        }
    );
}

async function subirFoto(incidenciaId) {
    if (!fotoFile) return;
    const fd = new FormData();
    fd.append('archivo', fotoFile);
    const token = localStorage.getItem('auth_token');
    await fetch(`/api/incidencias/${incidenciaId}/evidencias`, {
        method: 'POST',
        headers: { Authorization: `Bearer ${token}`, Accept: 'application/json' },
        body: fd,
    });
}

async function enviarReporte() {
    const errEl = document.getElementById('error-msg');
    const btn   = document.getElementById('sendBtn');
    errEl.style.display = 'none';

    if (!selectedTipo || !selectedSub) {
        errEl.textContent = 'Selecciona tipo y subtipo.';
        errEl.style.display = 'block';
        return;
    }
    if (!userLat) {
        errEl.textContent = 'Necesitamos tu ubicación. Toca "Cambiar".';
        errEl.style.display = 'block';
        return;
    }
    const desc = document.getElementById('descripcion').value.trim();
    if (!desc) {
        errEl.textContent = 'Describe el problema brevemente.';
        errEl.style.display = 'block';
        return;
    }

    btn.disabled = true;
    btn.innerHTML = '<i class="bi bi-arrow-clockwise"></i> Enviando…';

    try {
        const inc = await apiFetch('/incidencias', {
            method: 'POST',
            body: JSON.stringify({
                titulo:      `${selectedTipo} - ${selectedSub}`,
                descripcion: desc,
                prioridad:   'Media',
                lat:         userLat,
                lng:         userLng,
            }),
        });
        await subirFoto(inc.id);
        window.location.href = `detalle.html?id=${inc.id}`;
    } catch (e) {
        errEl.textContent = e.message || 'Error al enviar el reporte.';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-send"></i> Enviar reporte';
    }
}

// Iniciar
initTipos();
detectarUbicacion();
</script>
</body>
</html>
