<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Panel de gestión y seguimiento de incidencias urbanas">
    <title>Panel de Incidencias</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<div class="app-container">

    <div class="greeting-header">
        <div>
            <div class="greeting-text" id="rolLabel">…</div>
            <div class="greeting-name" id="userName">…</div>
        </div>
        <i class="bi bi-bell" style="font-size:22px;color:var(--gray-400)"></i>
    </div>

    <!-- Resumen rápido -->
    <div class="section" style="padding-bottom:0">
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:4px">
            <div class="card-white" style="padding:12px;text-align:center;margin-bottom:0">
                <div style="font-size:22px;font-weight:700;color:var(--orange)" id="totalEl">—</div>
                <div class="text-muted-sm">Total</div>
            </div>
            <div class="card-white" style="padding:12px;text-align:center;margin-bottom:0">
                <div style="font-size:22px;font-weight:700;color:#EF4444" id="urgentesEl">—</div>
                <div class="text-muted-sm">Urgentes</div>
            </div>
            <div class="card-white" style="padding:12px;text-align:center;margin-bottom:0">
                <div style="font-size:22px;font-weight:700;color:var(--green)" id="resueltasEl">—</div>
                <div class="text-muted-sm">Resueltas</div>
            </div>
        </div>
    </div>

    <!-- Alert de urgentes -->
    <div class="alert-banner" id="alertBanner" style="display:none">
        <i class="bi bi-exclamation-triangle"></i>
        <span id="alertText"></span>
    </div>

    <!-- Filtros dinámicos -->
    <div class="filter-tabs" id="filterTabs">
        <button class="filter-tab active" data-filter="todas" onclick="setFiltro(this)">Todas</button>
        <button class="filter-tab" data-filter="urgente" onclick="setFiltro(this)">Urgentes</button>
        <!-- Filtros extra por rol se añaden desde JS -->
    </div>
    <div style="padding:0 16px 8px">
        <input type="search" class="form-control form-control-sm" id="tipoSearch"
               placeholder="Buscar por título…" oninput="renderLista()">
    </div>

    <div class="section">
        <div class="section-title" id="countLabel">Incidencias</div>
        <div id="lista"><div class="text-muted-sm text-center py-3">Cargando…</div></div>
    </div>

    <!-- Botón reportar (solo ciudadano) -->
    <div id="btnReportarWrap" style="display:none;padding:0 16px 16px">
        <a href="reportar.html" class="btn-orange" style="display:flex;align-items:center;justify-content:center;gap:8px">
            <i class="bi bi-plus-circle"></i> Reportar incidencia
        </a>
    </div>

</div>

<script src="/js/app.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/catalogos.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ── Protección de ruta ────────────────────────────────────────────────────
if (!requireAuth()) throw new Error('Redirigiendo');

const role = getRole();
document.getElementById('userName').textContent = getUserName();

// Etiqueta de rol
const ROL_LABELS = {
    CIUDADANO:  'Mis incidencias',
    TECNICO:    'Mis asignaciones',
    SUPERVISOR: 'Supervisor de incidencias',
    ADMIN:      'Administrador del sistema',
};
document.getElementById('rolLabel').textContent = ROL_LABELS[role] || 'Incidencias';

// Filtros extra por rol
if (role === 'SUPERVISOR' || role === 'ADMIN') {
    const tabs = document.getElementById('filterTabs');
    tabs.insertAdjacentHTML('beforeend', `
        <button class="filter-tab" data-filter="sin-asig" onclick="setFiltro(this)">Sin asignar</button>
        <button class="filter-tab" data-filter="proceso"  onclick="setFiltro(this)">En proceso</button>
    `);
}

// Mostrar botón reportar al ciudadano
if (role === 'CIUDADANO') {
    document.getElementById('btnReportarWrap').style.display = '';
}

let todas = [];
let filtroActual = 'todas';

async function cargar() {
    try {
        todas = await apiFetch('/incidencias');

        // Cargar catálogos para tener labels actualizados
        await getCatalogos();

        const urgentes  = todas.filter(i => i.prioridad === 'Urgente');
        const resueltas = todas.filter(i => i.estado === 'Resuelta');

        document.getElementById('totalEl').textContent    = todas.length;
        document.getElementById('urgentesEl').textContent = urgentes.length;
        document.getElementById('resueltasEl').textContent = resueltas.length;

        if (urgentes.filter(i => i.estado !== 'Resuelta').length > 0) {
            const n = urgentes.filter(i => i.estado !== 'Resuelta').length;
            document.getElementById('alertBanner').style.display = 'flex';
            document.getElementById('alertText').textContent =
                `${n} incidencia${n > 1 ? 's urgentes' : ' urgente'} sin resolver`;
            showNotifBadge(n);
        }

        renderLista();
    } catch {
        document.getElementById('lista').innerHTML =
            '<div class="text-muted-sm text-center py-3">Error al cargar.</div>';
    }
}

function filtrar(lista) {
    const q = (document.getElementById('tipoSearch')?.value || '').toLowerCase();
    let result;
    switch (filtroActual) {
        case 'urgente':  result = lista.filter(i => i.prioridad === 'Urgente'); break;
        case 'sin-asig': result = lista.filter(i => !i.asignado_a); break;
        case 'proceso':  result = lista.filter(i => i.estado === 'En Proceso'); break;
        default:         result = lista;
    }
    return q ? result.filter(i => (i.titulo || '').toLowerCase().includes(q)) : result;
}

function setFiltro(btn) {
    document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filtroActual = btn.dataset.filter;
    renderLista();
}

function renderLista() {
    const lista = filtrar(todas);
    document.getElementById('countLabel').textContent = `Incidencias (${lista.length})`;

    // Determinar la URL de detalle relativa a esta página
    const href = i => `detalle.html?id=${i.id}`;

    document.getElementById('lista').innerHTML = lista.length
        ? lista.map(i => incidentCardHTMLCatalog(i, href(i))).join('')
        : '<div class="text-muted-sm text-center py-3">Sin incidencias en este filtro.</div>';
}

/**
 * Versión de incidentCardHTML que usa catálogos dinámicos.
 */
function incidentCardHTMLCatalog(inc, href) {
    const priInfo = getPrioridadInfo(inc.prioridad);
    const estInfo = getEstadoInfo(inc.estado);
    return `
    <div class="incident-card ${priInfo.css_class ? priInfo.css_class.replace('badge-','border-') : ''}"
         onclick="window.location.href='${href}'">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
            <span style="font-size:14px;font-weight:600;color:var(--gray-900)">${inc.titulo}</span>
            <span class="badge-status ${priInfo.css_class}">${priInfo.label || inc.prioridad || 'Media'}</span>
        </div>
        <div class="text-muted-sm" style="margin-bottom:6px">
            <i class="bi bi-geo-alt" style="font-size:11px"></i>
            ${inc.ubicacion ? 'Ver ubicación' : 'Sin ubicación'} · ${timeAgo(inc.fecha_creacion)}
        </div>
        <span class="badge-status ${estInfo.css_class}">${estInfo.label || inc.estado}</span>
        ${(role === 'SUPERVISOR' || role === 'ADMIN') && !inc.asignado_a
            ? '<span class="badge-status badge-urgente" style="margin-left:6px;font-size:10px">Sin asignar</span>'
            : ''}
    </div>`;
}

cargar();
</script>
</body>
</html>
