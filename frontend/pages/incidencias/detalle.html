<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Detalle de incidencia — gestión y seguimiento">
    <title>Detalle de incidencia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <style>
        .readonly-estado { display:flex; gap:8px; }
        .readonly-estado .status-btn { cursor:default; pointer-events:none; }
    </style>
</head>
<body>
<div class="app-container">

    <div class="app-header">
        <button class="back-btn" onclick="history.back()"><i class="bi bi-chevron-left"></i></button>
        <h5>Detalle de incidencia</h5>
        <div></div>
    </div>

    <div id="content"><div class="text-muted-sm text-center py-5">Cargando…</div></div>

</div>

<!-- Modal de Bootstrap (necesario para modal.js) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/js/app.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/catalogos.js"></script>
<script src="/js/modal.js"></script>
<script src="/js/detalle-shared.js"></script>
<script>
// ── Protección de ruta ────────────────────────────────────────────────────
if (!requireAuth()) throw new Error('Redirigiendo');

const role = getRole();
const id   = new URLSearchParams(window.location.search).get('id');
if (!id) window.location.href = 'panel.html';

// ── Estado seleccionado (para cambio) ─────────────────────────────────────
let estadoSeleccionado = null;

async function cargar() {
    try {
        const d = await apiFetch(`/incidencias/${id}`);
        await getCatalogos(); // precarga el caché
        render(d);
    } catch {
        document.getElementById('content').innerHTML =
            '<div class="section text-muted-sm">No se pudo cargar la incidencia.</div>';
    }
}

async function render({ incidencia: inc, evidencias, historial_seguimiento, comentarios }) {
    const priInfo  = getPrioridadInfo(inc.prioridad);
    const estInfo  = getEstadoInfo(inc.estado);
    const tResol   = tiempoResolucion(inc.fecha_creacion, historial_seguimiento);
    const hasCoords = inc.ubicacion?.coordinates;

    // ── ¿Puede cambiar estado? ──────────────────────────────────────────────
    // SUPERVISOR/ADMIN: siempre
    // TECNICO: si está asignado a él
    const userUuid = getUser()?.uuid;
    const puedeGestionar = (role === 'SUPERVISOR' || role === 'ADMIN')
        || (role === 'TECNICO' && inc.asignado_a === userUuid);
    const puedeAsignar   = role === 'SUPERVISOR' || role === 'ADMIN';
    const puedeEliminar  = role === 'SUPERVISOR' || role === 'ADMIN';

    // ── Sección estado ──────────────────────────────────────────────────────
    let estadoSection = '';
    if (puedeGestionar) {
        if (inc.estado === 'Resuelta' && (role === 'SUPERVISOR' || role === 'ADMIN')) {
            estadoSection = `
            <div class="section-title">Estado actual
                <span style="font-size:11px;color:var(--gray-400);font-weight:400;margin-left:6px">
                    — gestionado por el técnico
                </span>
            </div>
            <div class="readonly-estado" id="estadoContainer"></div>
            <button onclick="rechazarResolucion('${id}', '${role.toLowerCase()}', cargar)"
                    style="margin-top:10px;width:100%;padding:11px;border-radius:12px;
                           border:1.5px solid #EF4444;background:#FEF2F2;color:#B91C1C;
                           font-weight:600;font-size:13px;cursor:pointer">
                <i class="bi bi-x-circle"></i> Rechazar resolución — devolver a En proceso
            </button>`;
        } else {
            estadoSection = `
            <div class="section-title">Estado actual</div>
            <div id="estadoContainer"></div>
            <textarea class="form-input mt-2" id="notaInput"
                      placeholder="Observación del cambio de estado…"></textarea>
            <button class="btn-orange mt-2" onclick="guardarEstado()">
                <i class="bi bi-check-circle"></i> Actualizar estado
            </button>`;
        }
    } else {
        // Solo lectura (ciudadano)
        estadoSection = `
        <div class="section-title">Estado actual</div>
        <div class="readonly-estado" id="estadoContainer"></div>`;
    }

    document.getElementById('content').innerHTML = `
    <div class="detail-layout">

        <!-- COLUMNA IZQUIERDA -->
        <div class="detail-left">
            ${hasCoords ? `
            <div class="section" style="padding-bottom:8px">
                <div class="map-mini" id="detalleMap"></div>
            </div>
            <div class="section" style="padding-top:0;padding-bottom:8px">
                <div class="location-row">
                    <div class="loc-text">
                        <i class="bi bi-geo-alt-fill" style="color:var(--orange)"></i>
                        ${inc.ubicacion.coordinates[1].toFixed(5)}, ${inc.ubicacion.coordinates[0].toFixed(5)}
                    </div>
                </div>
            </div>` : ''}

            ${puedeAsignar ? `
            <div class="section">
                <div class="section-title">Técnico asignado</div>
                <div class="assigned-row">
                    <div style="display:flex;align-items:center">
                        ${inc.asignado_a
                            ? `<div class="assigned-avatar">T</div>
                               <span style="font-size:14px;font-weight:500;word-break:break-all">
                                   ${inc.asignado_a}
                               </span>`
                            : `<span class="text-muted-sm">Sin asignar</span>`}
                    </div>
                    <button class="btn-cambiar"
                            onclick="showAsignarTecnicoModal('${id}', cargar)">
                        <i class="bi bi-person-plus"></i>
                        ${inc.asignado_a ? 'Reasignar' : 'Asignar'}
                    </button>
                </div>
            </div>` : ''}
        </div>

        <!-- COLUMNA DERECHA -->
        <div class="detail-right">
            <div class="section" style="padding-bottom:8px">
                <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
                    <span style="font-size:18px;font-weight:700;color:var(--gray-900)">${inc.titulo}</span>
                    <span class="badge-status ${priInfo.css_class}">${priInfo.label || inc.prioridad || 'Media'}</span>
                </div>
                <div class="text-muted-sm">Reportado ${timeAgo(inc.fecha_creacion)}</div>
                ${tResol ? `<div class="text-muted-sm" style="margin-top:4px">
                    <i class="bi bi-clock-history"></i> Resuelto en ${tResol}
                </div>` : ''}
            </div>

            <div class="divider"></div>

            <div class="section">
                ${estadoSection}
            </div>

            <div class="divider"></div>

            <div class="section">
                <div class="section-title">Descripción</div>
                <p style="font-size:14px;color:#4B5563;line-height:1.6;margin:0">${inc.descripcion || '—'}</p>
            </div>

            ${buildEvidencias(evidencias)}

            <div class="divider"></div>

            <div class="section">
                <div class="section-title">Historial de cambios</div>
                ${buildHistorial(historial_seguimiento)}
            </div>

            <div class="divider"></div>

            <div class="section">
                <div class="section-title">Notas del equipo</div>
                ${buildComentarios(comentarios)}
                ${puedeGestionar ? `
                <textarea class="form-input mt-2" id="notaInput"
                          placeholder="Agregar observación…"></textarea>
                <button class="btn-orange mt-2"
                        onclick="agregarNota('${id}', cargar)">
                    <i class="bi bi-chat-left-text"></i> Agregar nota
                </button>` : ''}
            </div>

            ${puedeEliminar ? `
            <div class="section" style="padding-top:0">
                <hr style="border-color:var(--gray-200);margin:0 0 16px">
                <button class="btn btn-danger w-100"
                        onclick="eliminarIncidencia('${id}', 'panel.html')">
                    <i class="bi bi-trash-fill"></i> Eliminar incidencia
                </button>
            </div>` : ''}
        </div>

    </div>`;

    // Renderizar botones de estado desde catálogo
    const editable = puedeGestionar && inc.estado !== 'Resuelta';
    await renderEstadosBtns('estadoContainer', inc.estado, editable, (codigo) => {
        estadoSeleccionado = codigo;
    });

    // Mapa
    if (hasCoords) initDetalleMap(inc.ubicacion.coordinates);
}

async function guardarEstado() {
    if (!estadoSeleccionado) return;
    const nota = document.getElementById('notaInput')?.value.trim() || '';
    try {
        await apiFetch(`/incidencias/${id}/estado`, {
            method: 'POST',
            body: JSON.stringify({
                estado_nuevo: estadoSeleccionado,
                observacion:  nota || `Actualizado por ${role.toLowerCase()}.`,
            }),
        });
        cargar();
    } catch (e) {
        alert(e.message || 'Error al actualizar estado.');
    }
}

cargar();
</script>
</body>
</html>
