<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Dashboard de Control Global de la Plataforma">
    <title>Panel de Control — Administrador</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <script src="/js/colors.js"></script>
</head>
<body>
<div class="app-container">

    <div class="greeting-header">
        <div>
            <div class="greeting-text">Administrador del sistema</div>
            <div class="greeting-name">Panel de control</div>
        </div>
        <div class="topbar-actions">
            <div class="topbar-search">
                <i class="bi bi-search"></i>
                <input type="search" placeholder="Buscar incidencia, usuario…" disabled>
            </div>
            <i class="bi bi-bell" style="font-size:22px;color:var(--gray-400)"></i>
        </div>
    </div>

    <!-- KPIs del sistema -->
    <div class="section">
        <div class="section-title">Resumen del sistema</div>
        <div class="kpi-grid">
            <div class="kpi-card">
                <i class="bi bi-exclamation-circle kpi-ico"></i>
                <div class="kpi-val" id="totalInc">—</div>
                <div class="kpi-lbl">Total incidencias</div>
            </div>
            <div class="kpi-card">
                <i class="bi bi-fire kpi-ico" style="color:#F87171"></i>
                <div class="kpi-val" id="urgentesEl">—</div>
                <div class="kpi-lbl">Urgentes</div>
            </div>
            <div class="kpi-card">
                <i class="bi bi-check-circle kpi-ico" style="color:#4ADE80"></i>
                <div class="kpi-val" id="resueltasEl">—</div>
                <div class="kpi-lbl">Resueltas</div>
            </div>
            <div class="kpi-card">
                <i class="bi bi-clock kpi-ico" style="color:#60A5FA"></i>
                <div class="kpi-val" id="pendientesEl">—</div>
                <div class="kpi-lbl">Pendientes</div>
            </div>
            <div class="kpi-card kpi-main">
                <i class="bi bi-arrow-repeat kpi-ico"></i>
                <div class="kpi-val" id="procesoEl">—</div>
                <div class="kpi-lbl">En proceso</div>
            </div>
        </div>
    </div>

    <!-- Distribución + Incidencias por semana + Actividad reciente (3 columnas en escritorio) -->
    <div class="section" style="padding-top:0">
        <div class="dash-grid-3">
            <div class="card-white" style="margin-bottom:0">
                <div class="section-title">Distribución</div>
                <div id="chartEstado">
                    <div class="text-muted-sm">Cargando…</div>
                </div>
            </div>
            <div class="card-white" style="margin-bottom:0">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
                    <div class="section-title" style="margin-bottom:0">Incidencias por semana</div>
                    <span class="week-delta" id="weekDelta"></span>
                </div>
                <div id="chartSemana" class="week-chart">
                    <div class="text-muted-sm">Cargando…</div>
                </div>
            </div>
            <div class="card-white" style="margin-bottom:0">
                <div class="section-title">Actividad reciente</div>
                <div id="listaActividad" class="activity-feed">
                    <div class="text-muted-sm">Cargando…</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Incidencias recientes -->
    <div class="section" style="padding-top:0">
        <div class="section-title">Incidencias recientes</div>

        <!-- Móvil: tarjetas -->
        <div id="listaRecientes" class="mobile-only"><div class="text-muted-sm text-center py-3">Cargando…</div></div>

        <!-- Escritorio: tabla de datos -->
        <div class="table-card desktop-only">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Título</th>
                        <th>Prioridad</th>
                        <th>Estado</th>
                        <th>Asignado</th>
                        <th>Fecha</th>
                    </tr>
                </thead>
                <tbody id="tablaRecientes">
                    <tr><td colspan="5" class="text-muted-sm text-center py-3">Cargando…</td></tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/app.js"></script>
<script src="/js/toast.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/modal.js"></script>
<script>
if (!requireAdmin()) throw new Error('Redirigiendo');

async function cargarStats() {
    try {
        const stats = await apiFetch('/dashboard/stats');
        document.getElementById('totalInc').textContent     = stats.total;
        document.getElementById('urgentesEl').textContent   = stats.urgentes;
        document.getElementById('resueltasEl').textContent  = stats.resueltas;
        document.getElementById('pendientesEl').textContent = stats.pendientes;
        document.getElementById('procesoEl').textContent    = stats.proceso;

        renderChart(stats.total, stats.pendientes, stats.proceso, stats.resueltas);
        renderSemana(stats.porSemana || []);
        renderActividad(stats.actividad || []);
        renderRecientes(stats.recientes || []);
    } catch {}
}

/** Donut (conic-gradient) + leyenda con porcentajes. */
function renderChart(total, pendientes, proceso, resueltas) {
    const el = document.getElementById('chartEstado');
    if (!total) { el.innerHTML = '<div class="text-muted-sm">Sin datos.</div>'; return; }
    const pct = n => Math.round((n / total) * 100);
    const segs = [
        { label: 'Pendiente',  n: pendientes, color: '#60A5FA' },
        { label: 'En proceso', n: proceso,    color: '#FB923C' },
        { label: 'Resuelto',   n: resueltas,  color: '#4ADE80' },
    ];
    let acc = 0;
    const stops = segs.map(s => {
        const from = acc; acc += (s.n / total) * 100;
        return `${s.color} ${from}% ${acc}%`;
    }).join(',');

    el.innerHTML = `
    <div class="donut-wrap">
        <div class="donut" style="background:conic-gradient(${stops})">
            <div class="donut-hole">
                <div class="dh-val">${total}</div>
                <div class="dh-lbl">total</div>
            </div>
        </div>
        <div class="donut-legend">
            ${segs.map(s => `
            <div class="dl-row">
                <span class="dl-name"><span class="dl-dot" style="background:${s.color}"></span>${s.label}</span>
                <span class="dl-val">${s.n} · ${pct(s.n)}%</span>
            </div>`).join('')}
        </div>
    </div>`;
}

/** Barras verticales con el conteo de incidencias por día (últimos 7 días). */
function renderSemana(dias) {
    const el = document.getElementById('chartSemana');
    const max = Math.max(1, ...dias.map(d => d.total));
    const totalSemana = dias.reduce((a, d) => a + d.total, 0);
    document.getElementById('weekDelta').textContent = totalSemana ? `${totalSemana} esta semana` : '';

    if (!dias.length) { el.innerHTML = '<div class="text-muted-sm">Sin datos.</div>'; return; }

    el.innerHTML = dias.map(d => `
        <div class="week-bar-wrap">
            <div class="week-bar" style="height:${Math.round((d.total / max) * 100)}%" title="${d.total}"></div>
            <div class="week-bar-label">${d.dia}</div>
        </div>`).join('');
}

/** Feed de los últimos eventos del sistema. */
function renderActividad(items) {
    const el = document.getElementById('listaActividad');
    if (!items.length) { el.innerHTML = '<div class="text-muted-sm">Sin actividad reciente.</div>'; return; }

    el.innerHTML = items.map(a => `
        <div class="activity-item">
            <span class="activity-dot"></span>
            <div>
                <div class="activity-text">${a.texto}</div>
                <div class="activity-time">${timeAgo(a.fecha)}</div>
            </div>
        </div>`).join('');
}

/** Últimas 5 incidencias reportadas: tarjetas (móvil) + tabla (escritorio). */
function renderRecientes(items) {
    const tbody = document.getElementById('tablaRecientes');
    const lista = document.getElementById('listaRecientes');

    if (!items.length) {
        tbody.innerHTML = '<tr><td colspan="5" class="text-muted-sm text-center py-3">Sin incidencias registradas.</td></tr>';
        lista.innerHTML = '<div class="text-muted-sm text-center py-3">Sin incidencias registradas.</div>';
        return;
    }

    tbody.innerHTML = items.map(i => {
        const pri = prioridadInfo(i.prioridad);
        const est = estadoInfo(i.estado);
        return `
        <tr>
            <td class="td-title">${i.titulo}</td>
            <td><span class="badge-status ${pri.badgeCls}">${i.prioridad || 'Media'}</span></td>
            <td><span class="badge-status ${est.cls}">${est.label}</span></td>
            <td>${i.asignado_a_nombre || '<span class="text-muted-sm">Sin asignar</span>'}</td>
            <td class="text-muted-sm">${timeAgo(i.fecha_creacion)}</td>
        </tr>`;
    }).join('');

    lista.innerHTML = items.map(i => {
        const pri = prioridadInfo(i.prioridad);
        const est = estadoInfo(i.estado);
        return `
        <div class="incident-card ${pri.borderCls}">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
                <span style="font-size:14px;font-weight:600;color:var(--gray-900)">${i.titulo}</span>
                <span class="badge-status ${pri.badgeCls}">${i.prioridad || 'Media'}</span>
            </div>
            <div class="text-muted-sm" style="margin-bottom:6px">
                ${i.asignado_a_nombre || 'Sin asignar'} · ${timeAgo(i.fecha_creacion)}
            </div>
            <span class="badge-status ${est.cls}">${est.label}</span>
        </div>`;
    }).join('');
}

cargarStats();
</script>
</body>
</html>
