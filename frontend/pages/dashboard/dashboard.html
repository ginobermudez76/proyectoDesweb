<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Dashboard de Control Global de la Plataforma">
    <title>Panel de Control — Administrador</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" integrity="sha384-XVE0LqdyWESihx0laEzd3gYh4gI9YLsp5MTNQeSEvlZy1MIPUdVADmaCwgbqi3Hz" crossorigin="anonymous" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <script src="/js/colors.js"></script>
    <style>
        .stat-card {
            background:#fff; border-radius:14px; padding:16px;
            display:flex; align-items:center; gap:14px;
            box-shadow:0 1px 3px rgba(0,0,0,.06);
        }
        .stat-card .icon-circle {
            width:48px; height:48px; border-radius:12px;
            display:flex; align-items:center; justify-content:center;
            font-size:22px; flex-shrink:0;
        }
        .stat-card .val { font-size:24px; font-weight:700; color:var(--gray-900); }
        .stat-card .lbl { font-size:12px; color:var(--gray-400); }
    </style>
</head>
<body>
<main class="app-container">

    <div class="greeting-header">
        <div>
            <div class="greeting-text">Administrador del sistema</div>
            <div class="greeting-name" id="userName">…</div>
        </div>
        <i class="bi bi-gear" style="font-size:22px;color:var(--gray-400)"></i>
    </div>

    <!-- Stats del sistema -->
    <div class="section">
        <div class="section-title">Resumen del sistema</div>
        <div class="admin-stats-wrap">
            <div class="stat-card">
                <div class="icon-circle" style="background:#FFF7ED">
                    <i class="bi bi-exclamation-circle" style="color:var(--orange)"></i>
                </div>
                <div>
                    <div class="val" id="totalInc">—</div>
                    <div class="lbl">Total de incidencias</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="icon-circle" style="background:#FEE2E2">
                    <i class="bi bi-fire" style="color:#EF4444"></i>
                </div>
                <div><div class="val" id="urgentesEl">—</div><div class="lbl">Urgentes</div></div>
            </div>
            <div class="stat-card">
                <div class="icon-circle" style="background:#D1FAE5">
                    <i class="bi bi-check-circle" style="color:var(--green)"></i>
                </div>
                <div><div class="val" id="resueltasEl">—</div><div class="lbl">Resueltas</div></div>
            </div>
            <div class="stat-card">
                <div class="icon-circle" style="background:#DBEAFE">
                    <i class="bi bi-clock" style="color:var(--blue)"></i>
                </div>
                <div><div class="val" id="pendientesEl">—</div><div class="lbl">Pendientes</div></div>
            </div>
            <div class="stat-card">
                <div class="icon-circle" style="background:#FED7AA">
                    <i class="bi bi-arrow-repeat" style="color:var(--orange)"></i>
                </div>
                <div><div class="val" id="procesoEl">—</div><div class="lbl">En proceso</div></div>
            </div>
        </div>
    </div>

    <div class="divider"></div>

    <!-- Distribución por estado (Bootstrap progress bars) -->
    <div class="section">
        <div class="section-title">Distribución por estado</div>
        <div id="chartEstado">
            <div class="text-muted-sm">Cargando…</div>
        </div>
    </div>

    <div class="divider"></div>

    <!-- Acciones del sistema -->
    <div class="section">
        <div class="section-title">Gestión del sistema</div>
        <div class="menu-list">
            <a class="menu-item" href="../usuarios/usuarios.html">
                <div class="menu-left"><i class="bi bi-people lead"></i> Usuarios y roles</div>
                <i class="bi bi-chevron-right arrow"></i>
            </a>
            <a class="menu-item">
                <div class="menu-left"><i class="bi bi-shield-lock lead"></i> Permisos RBAC</div>
                <i class="bi bi-chevron-right arrow"></i>
            </a>
            <a class="menu-item">
                <div class="menu-left"><i class="bi bi-journal-text lead"></i> Auditoría</div>
                <i class="bi bi-chevron-right arrow"></i>
            </a>
            <a class="menu-item">
                <div class="menu-left"><i class="bi bi-bar-chart-line lead"></i> Reportes globales</div>
                <i class="bi bi-chevron-right arrow"></i>
            </a>
        </div>
    </div>

    <div class="section" style="padding-top:0">
        <button class="btn-red" onclick="confirmLogout('../../')">
            <i class="bi bi-box-arrow-right"></i> Cerrar sesión
        </button>
    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
<script src="/js/app.js"></script>
<script src="/js/toast.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/modal.js"></script>
<script>
if (!requireAdmin()) throw new Error('Redirigiendo');
document.getElementById('userName').textContent = getUserName();

async function cargarStats() {
    try {
        const stats = await apiFetch('/dashboard/stats');
        const total = stats.total;
        const urgentes = stats.urgentes;
        const resueltas = stats.resueltas;
        const pendientes = stats.pendientes;
        const proceso = stats.proceso;

        document.getElementById('totalInc').textContent     = total;
        document.getElementById('urgentesEl').textContent   = urgentes;
        document.getElementById('resueltasEl').textContent  = resueltas;
        document.getElementById('pendientesEl').textContent = pendientes;
        document.getElementById('procesoEl').textContent    = proceso;

        renderChart(total, pendientes, proceso, resueltas);
    } catch {}
}

function renderChart(total, pendientes, proceso, resueltas) {
    if (!total) { document.getElementById('chartEstado').innerHTML = '<div class="text-muted-sm">Sin datos.</div>'; return; }
    const pct = n => total ? Math.round((n / total) * 100) : 0;
    const bars = [
        { label: 'Pendiente',   n: pendientes, color: '#3B82F6' },
        { label: 'En proceso',  n: proceso,    color: '#F97316' },
        { label: 'Resuelto',    n: resueltas,  color: '#22C55E' },
    ];
    document.getElementById('chartEstado').innerHTML = bars.map(b => `
        <div class="mb-2">
            <div class="d-flex justify-content-between mb-1">
                <small class="fw-semibold">${b.label}</small>
                <small class="text-muted">${b.n} (${pct(b.n)}%)</small>
            </div>
            <div class="progress" style="height:18px;border-radius:8px">
                <div class="progress-bar" role="progressbar"
                    style="width:${pct(b.n)}%;background-color:${b.color};border-radius:8px"
                    aria-valuenow="${pct(b.n)}" aria-valuemin="0" aria-valuemax="100">
                </div>
            </div>
        </div>`).join('');
}

cargarStats();
</script>
</body>
</html>
