<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mi Perfil — Técnico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">
</head>
<body>
<div class="app-container">

    <div class="app-header" style="justify-content:center;border-bottom:none">
        <h5>Mi Perfil</h5>
    </div>

    <div class="section" style="text-align:center;padding-top:8px">
        <div class="avatar-circle" id="avatarEl" style="background:#6366F1">?</div>
        <div style="font-size:18px;font-weight:700;color:var(--gray-900)" id="nombreEl">…</div>
        <div class="text-muted-sm">Técnico · Operador de Campo</div>
    </div>

    <div class="card-white mx-3 mb-3">
        <div class="profile-stats">
            <div class="stat-item">
                <div class="stat-value" id="asignadasEl">—</div>
                <div class="stat-label">Asignadas</div>
            </div>
            <div class="stat-item">
                <div class="stat-value green" id="resueltasEl">—</div>
                <div class="stat-label">Resueltas</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="procesoEl" style="color:#F97316">—</div>
                <div class="stat-label">En proceso</div>
            </div>
        </div>
    </div>

    <div class="section" style="padding-top:0">
        <div class="menu-list">
            <a class="menu-item"><div class="menu-left"><i class="bi bi-bell lead"></i> Notificaciones</div><i class="bi bi-chevron-right arrow"></i></a>
            <a class="menu-item"><div class="menu-left"><i class="bi bi-calendar3 lead"></i> Turnos y disponibilidad</div><i class="bi bi-chevron-right arrow"></i></a>
            <a class="menu-item"><div class="menu-left"><i class="bi bi-key lead"></i> Cambiar contraseña</div><i class="bi bi-chevron-right arrow"></i></a>
            <a class="menu-item"><div class="menu-left"><i class="bi bi-question-circle lead"></i> Ayuda y soporte</div><i class="bi bi-chevron-right arrow"></i></a>
        </div>
    </div>

    <div class="section" style="padding-top:0">
        <button class="btn-red" onclick="logout('../')">
            <i class="bi bi-box-arrow-right"></i> Cerrar sesión
        </button>
    </div>

</div>

<nav class="bottom-nav">
    <a href="panel.html"><i class="bi bi-house"></i>Inicio</a>
    <a href="mapa.html"><i class="bi bi-map"></i>Mapa</a>
    <a href="#"><i class="bi bi-bell"></i>Alertas</a>
    <a href="perfil.html" class="active"><i class="bi bi-person-fill"></i>Perfil</a>
</nav>

<script src="../js/app.js"></script>
<script src="../js/auth.js"></script>
<script>
if (!requireTecnico()) throw new Error('Redirigiendo');
const user = getUser();
document.getElementById('avatarEl').textContent = getUserInitials();
document.getElementById('nombreEl').textContent = getUserName();

async function cargarStats() {
    try {
        const data = await apiFetch('/incidencias');
        const mias = data.filter(i => String(i.asignado_a) === String(user.id));
        document.getElementById('asignadasEl').textContent = mias.length;
        document.getElementById('resueltasEl').textContent = mias.filter(i => i.estado === 'Resuelta').length;
        document.getElementById('procesoEl').textContent   = mias.filter(i => i.estado === 'En Proceso').length;
    } catch {}
}
cargarStats();
</script>
</body>
</html>
