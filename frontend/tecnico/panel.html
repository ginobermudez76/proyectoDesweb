<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Panel — Técnico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">
</head>
<body>
<div class="app-container">

    <div class="greeting-header">
        <div>
            <div class="greeting-text">Técnico de campo</div>
            <div class="greeting-name" id="userName">…</div>
        </div>
        <i class="bi bi-bell" style="font-size:22px;color:var(--gray-400)"></i>
    </div>

    <!-- Alert urgentes -->
    <div class="alert-banner" id="alertBanner" style="display:none">
        <i class="bi bi-exclamation-triangle"></i>
        <span id="alertText"></span>
    </div>

    <!-- Filtros -->
    <div class="filter-tabs">
        <button class="filter-tab active" data-filter="mias"     onclick="setFiltro(this)">Mis asignadas</button>
        <button class="filter-tab"        data-filter="urgente"  onclick="setFiltro(this)">Urgentes</button>
        <button class="filter-tab"        data-filter="proceso"  onclick="setFiltro(this)">En proceso</button>
        <button class="filter-tab"        data-filter="resueltas"onclick="setFiltro(this)">Resueltas</button>
    </div>

    <div class="section">
        <div class="section-title" id="countLabel">Mis incidencias</div>
        <div id="lista"><div class="text-muted-sm text-center py-3">Cargando…</div></div>
    </div>

</div>

<nav class="bottom-nav">
    <a href="panel.html" class="active"><i class="bi bi-house-fill"></i>Inicio</a>
    <a href="mapa.html"><i class="bi bi-map"></i>Mapa</a>
    <a href="#"><i class="bi bi-bell"></i>Alertas</a>
    <a href="perfil.html"><i class="bi bi-person"></i>Perfil</a>
</nav>

<script src="../js/app.js"></script>
<script src="../js/auth.js"></script>
<script>
if (!requireTecnico()) throw new Error('Redirigiendo');

const user = getUser();
document.getElementById('userName').textContent = getUserName();

let todas = [];
let filtroActual = 'mias';

async function cargar() {
    try {
        todas = await apiFetch('/incidencias');
        const urgentes = todas.filter(i => i.prioridad === 'Urgente' && i.asignado_a == user.id);
        if (urgentes.length) {
            document.getElementById('alertBanner').style.display = 'flex';
            document.getElementById('alertText').textContent =
                `${urgentes.length} incidencia${urgentes.length > 1 ? 's urgentes' : ' urgente'} — Requiere${urgentes.length > 1 ? 'n' : ''} atención inmediata`;
        }
        renderLista();
    } catch {
        document.getElementById('lista').innerHTML =
            '<div class="text-muted-sm text-center py-3">Error al cargar.</div>';
    }
}

function filtrar(lista) {
    switch (filtroActual) {
        case 'mias':      return lista.filter(i => String(i.asignado_a) === String(user.id));
        case 'urgente':   return lista.filter(i => i.prioridad === 'Urgente');
        case 'proceso':   return lista.filter(i => i.estado === 'En Proceso');
        case 'resueltas': return lista.filter(i => i.estado === 'Resuelta');
        default: return lista;
    }
}

function setFiltro(btn) {
    document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filtroActual = btn.dataset.filter;
    renderLista();
}

function renderLista() {
    const lista = filtrar(todas);
    document.getElementById('countLabel').textContent =
        `${filtroActual === 'mias' ? 'Mis incidencias' : 'Incidencias'} (${lista.length})`;
    document.getElementById('lista').innerHTML = lista.length
        ? lista.map(i => incidentCardHTML(i, `detalle.html?id=${i._id}`)).join('')
        : '<div class="text-muted-sm text-center py-3">Sin incidencias en este filtro.</div>';
}

cargar();
</script>
</body>
</html>
