<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Detalle — Técnico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link href="../css/style.css" rel="stylesheet">
</head>
<body>
<div class="app-container">

    <div class="app-header">
        <button class="back-btn" onclick="history.back()"><i class="bi bi-chevron-left"></i></button>
        <h5>Detalle de incidencia</h5>
        <div></div>
    </div>

    <div id="content"><div class="text-muted-sm text-center py-5">Cargando…</div></div>

</div>

<div class="action-bar">
    <button onclick="llamar()"><i class="bi bi-telephone"></i> Llamar</button>
    <button onclick="window.open('https://www.google.com/maps','_blank')"><i class="bi bi-send"></i> Cómo llegar</button>
</div>

<script src="../js/app.js"></script>
<script src="../js/auth.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
if (!requireTecnico()) throw new Error('Redirigiendo');

const id = new URLSearchParams(window.location.search).get('id');
if (!id) window.location.href = 'panel.html';

let estadoActual = null;

async function cargar() {
    try {
        const d = await apiFetch(`/incidencias/${id}`);
        estadoActual = d.incidencia.estado;
        render(d);
    } catch {
        document.getElementById('content').innerHTML =
            '<div class="section text-muted-sm">No se pudo cargar la incidencia.</div>';
    }
}

function render({ incidencia: inc, comentarios }) {
    const p = prioridadInfo(inc.prioridad);
    const hasCoords = inc.ubicacion?.coordinates;

    document.getElementById('content').innerHTML = `
        ${hasCoords ? `<div class="section" style="padding-bottom:8px">
            <div class="map-mini" id="detalleMap"></div>
        </div>` : ''}

        <div class="section" style="padding-bottom:8px">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
                <span style="font-size:18px;font-weight:700;color:var(--gray-900)">${inc.titulo}</span>
                <span class="badge-status ${p.badgeCls}">${inc.prioridad || 'Media'}</span>
            </div>
            <div class="text-muted-sm">Reportado ${timeAgo(inc.fecha_creacion)}</div>
        </div>

        <div class="divider"></div>

        <!-- Estado: técnico puede cambiar -->
        <div class="section">
            <div class="section-title">Actualizar estado</div>
            <div class="status-selector">
                <button class="status-btn" id="btnPendiente" onclick="selEstado('Pendiente')">Recibido</button>
                <button class="status-btn" id="btnProceso"   onclick="selEstado('En Proceso')">En proceso</button>
                <button class="status-btn" id="btnResuelta"  onclick="selEstado('Resuelta')">Resuelto</button>
            </div>
        </div>

        <div class="divider"></div>

        <!-- Descripción ciudadano -->
        <div class="section">
            <div class="section-title">Descripción del ciudadano</div>
            <p style="font-size:14px;color:#4B5563;line-height:1.6">${inc.descripcion || '—'}</p>
            ${hasCoords ? `<div class="location-row" style="margin-top:8px">
                <div class="loc-text">
                    <i class="bi bi-geo-alt-fill" style="color:var(--orange)"></i>
                    ${inc.ubicacion.coordinates[1].toFixed(5)}, ${inc.ubicacion.coordinates[0].toFixed(5)}
                </div>
            </div>` : ''}
        </div>

        <div class="divider"></div>

        <!-- Notas del técnico -->
        <div class="section">
            <div class="section-title">Notas del técnico</div>
            ${buildComentarios(comentarios)}
            <textarea class="form-input mt-2" id="notaInput" placeholder="Agrega notas sobre la atención…"></textarea>
        </div>

        <div class="section" style="padding-top:0">
            <button class="btn-orange" onclick="guardar()">
                <i class="bi bi-check-circle"></i> Actualizar estado
            </button>
        </div>
    `;

    marcaBotonesEstado(estadoActual);
    if (hasCoords) initMap(inc.ubicacion.coordinates);
}

function selEstado(e) { estadoActual = e; marcaBotonesEstado(e); }

function marcaBotonesEstado(e) {
    document.getElementById('btnPendiente').className = 'status-btn' + (e === 'Pendiente'  ? ' active-recibido' : '');
    document.getElementById('btnProceso').className   = 'status-btn' + (e === 'En Proceso' ? ' active-proceso'  : '');
    document.getElementById('btnResuelta').className  = 'status-btn' + (e === 'Resuelta'   ? ' active-resuelto' : '');
}

async function guardar() {
    const nota = document.getElementById('notaInput')?.value.trim() || '';
    try {
        await apiFetch(`/incidencias/${id}/estado`, {
            method: 'POST',
            body: JSON.stringify({ estado_nuevo: estadoActual, observacion: nota || undefined })
        });
        if (nota) {
            await apiFetch(`/incidencias/${id}/comentarios`, {
                method: 'POST',
                body: JSON.stringify({ texto: nota })
            });
        }
        cargar();
    } catch (e) { alert(e.message || 'Error al actualizar.'); }
}

function buildComentarios(lista) {
    if (!lista?.length) return '<div class="text-muted-sm">Sin notas aún.</div>';
    return lista.slice(-3).reverse().map(c => `
        <div style="margin-bottom:8px;padding:10px 12px;background:var(--gray-50);border-radius:10px">
            <div class="text-muted-sm" style="margin-bottom:2px">${timeAgo(c.fecha_creacion)}</div>
            <div style="font-size:13px;color:#374151">${c.texto}</div>
        </div>`).join('');
}

function initMap([lng, lat]) {
    const m = L.map('detalleMap', { zoomControl: false, dragging: false, scrollWheelZoom: false });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OSM' }).addTo(m);
    m.setView([lat, lng], 15);
    L.marker([lat, lng]).addTo(m);
    document.getElementById('detalleMap').onclick = () =>
        window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`, '_blank');
    document.getElementById('detalleMap').style.cursor = 'pointer';
}

function llamar() { alert('Función de llamada no configurada.'); }

cargar();
</script>
</body>
</html>
