<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Error — Incidencias</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      integrity="sha384-XGjxtQfXaH2tnPFa9x+ruJTuLE3Aa6LhHSWRr1XeTyhezb4abCG4ccI5AkVDxqC+"
      crossorigin="anonymous"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
      rel="stylesheet"
    />
    <link href="/css/style.css" rel="stylesheet" />
    <script src="/js/colors.js"></script>
    <style>
      .error-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
        text-align: center;
      }
      .error-card {
        background: #fff;
        border-radius: 20px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
        padding: 40px 32px;
        width: 100%;
        max-width: 400px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        animation: fadeInUp 0.4s ease-out;
      }
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .error-code {
        font-size: 72px;
        font-weight: 800;
        line-height: 1;
        background: linear-gradient(135deg, var(--orange), var(--red));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 8px;
        letter-spacing: -2px;
      }
      .error-icon {
        font-size: 48px;
        color: var(--red);
        background: #fee2e2;
        width: 80px;
        height: 80px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 8px;
      }
      .error-title {
        font-size: 18px;
        font-weight: 700;
        color: var(--gray-900);
      }
      .error-desc {
        font-size: 14px;
        color: var(--gray-400);
        line-height: 1.5;
      }
      .error-action {
        width: 100%;
        margin-top: 12px;
      }
    </style>
  </head>
  <body style="background: var(--gray-100)">
    <div class="error-wrapper">
      <div class="error-card">
        <div id="errorIcon" class="error-icon">
          <i class="bi bi-exclamation-triangle-fill"></i>
        </div>
        <div id="errorCode" class="error-code">500</div>
        <div id="errorTitle" class="error-title">Error en el sistema</div>
        <div id="errorDesc" class="error-desc">
          Ocurrió un fallo inesperado. Por favor, intenta de nuevo más tarde.
        </div>
        <div class="error-action">
          <button class="btn-orange" onclick="goHome()">
            <i class="bi bi-arrow-left"></i> Volver al inicio
          </button>
        </div>
      </div>
    </div>

    <script src="/js/app.js"></script>
    <script src="/js/auth.js"></script>
    <script>
      // Extraer parámetros de la URL
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code') || '500';
      const message = params.get('message') || 'Error interno del servidor';

      // Asignar código y título
      document.getElementById('errorCode').textContent = code;
      document.getElementById('errorTitle').textContent = message;

      // Asignar descripción e icono de acuerdo al código
      const iconEl = document.getElementById('errorIcon');
      const descEl = document.getElementById('errorDesc');

      switch (code) {
        case '403':
          iconEl.innerHTML = '<i class="bi bi-shield-lock-fill"></i>';
          iconEl.style.background = '#EDE9FE';
          iconEl.style.color = '#5B21B6';
          descEl.textContent =
            'No tienes los permisos o roles necesarios para acceder a este recurso.';
          break;
        case '404':
          iconEl.innerHTML = '<i class="bi bi-search"></i>';
          iconEl.style.background = '#DBEAFE';
          iconEl.style.color = '#1D4ED8';
          descEl.textContent =
            'El recurso, página o reporte solicitado no existe o ha sido eliminado.';
          break;
        case '429':
          iconEl.innerHTML = '<i class="bi bi-hourglass-split"></i>';
          iconEl.style.background = '#FEF3C7';
          iconEl.style.color = '#D97706';
          descEl.textContent =
            'Has realizado demasiadas solicitudes en poco tiempo. Por favor, espera un minuto.';
          break;
        case '502':
        case '504':
          iconEl.innerHTML = '<i class="bi bi-cloud-slash-fill"></i>';
          iconEl.style.background = '#FEE2E2';
          iconEl.style.color = '#EF4444';
          descEl.textContent =
            'La conexión con el proveedor externo de mapas o geolocalización ha fallado o tardado demasiado.';
          break;
        case '503':
          iconEl.innerHTML = '<i class="bi bi-wrench-adjustable-circle-fill"></i>';
          iconEl.style.background = '#E5E7EB';
          iconEl.style.color = '#374151';
          descEl.textContent =
            'El servidor se encuentra actualmente en mantenimiento o sobrecargado. Intenta en unos minutos.';
          break;
        default:
          iconEl.innerHTML = '<i class="bi bi-exclamation-triangle-fill"></i>';
          iconEl.style.background = '#FEE2E2';
          iconEl.style.color = '#EF4444';
          descEl.textContent =
            'Ocurrió un error inesperado en el servidor. Por favor, contacta a soporte técnico.';
          break;
      }

      function goHome() {
        if (typeof getToken === 'function' && getToken()) {
          // Redirigir al dashboard según el rol del usuario utilizando la función en auth.js
          window.location.href = dashboardUrl('/');
        } else {
          window.location.href = '/login.html';
        }
      }
    </script>
  </body>
</html>
