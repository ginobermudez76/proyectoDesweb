<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ingresar — Sistema de Incidencias</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" integrity="sha384-XVE0LqdyWESihx0laEzd3gYh4gI9YLsp5MTNQeSEvlZy1MIPUdVADmaCwgbqi3Hz" crossorigin="anonymous" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
<main class="login-container">
    <div class="login-logo">📍</div>
    <div class="login-title">Bienvenido</div>
    <div class="login-subtitle">Sistema de Incidencias Georreferenciadas</div>

    <div id="error-msg" class="error-msg"></div>

    <div class="form-group">
        <label class="form-label" for="correo">Correo electrónico o Usuario</label>
        <input class="form-input" id="correo" type="text" placeholder="tu@correo.com o usuario" autocomplete="username">
    </div>
    <div class="form-group">
        <label class="form-label" for="password">Contraseña</label>
        <input class="form-input" id="password" type="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn-orange mt-2" id="loginBtn" onclick="doLogin()">
        <i class="bi bi-box-arrow-in-right"></i> Ingresar
    </button>
    <div style="text-align:center;margin-top:16px">
        <a href="registro.html" style="font-size:13.5px;color:var(--orange);font-weight:600;text-decoration:none">
            ¿No tienes cuenta? Regístrate aquí
        </a>
    </div>
</main>

<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script>
    if (getToken()) window.location.href = dashboardUrl('');

    let _lockoutInterval = null;

    async function doLogin() {
        const btn    = document.getElementById('loginBtn');
        const errEl  = document.getElementById('error-msg');
        const correo = document.getElementById('correo').value.trim();
        const pass   = document.getElementById('password').value;

        errEl.style.display = 'none';
        if (!correo || !pass) {
            errEl.textContent = 'Completa todos los campos.';
            errEl.style.display = 'block';
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<i class="bi bi-arrow-clockwise"></i> Ingresando…';

        try {
            const data = await apiFetch('/login', {
                method: 'POST',
                body: JSON.stringify({ correo_electronico: correo, password: pass })
            });
            saveAuth(data.access_token, data.usuario);
            window.location.href = dashboardUrl('');
        } catch (e) {
            // Intentar parsear el cuerpo JSON de la respuesta de error
            let data = {};
            try { data = JSON.parse(e.responseText || '{}'); } catch (_) { console.warn(_); }

            if (e.status === 429 && data.retry_after_seconds) {
                // Bloqueo activo — mostrar cuenta regresiva
                _startLockoutCountdown(data.retry_after_seconds, errEl, btn);
            } else if (typeof data.attempts_remaining === 'number') {
                // Intento fallido — mostrar intentos restantes
                if (data.attempts_remaining <= 0) {
                    _startLockoutCountdown(data.retry_after_seconds || 300, errEl, btn);
                } else {
                    errEl.innerHTML = `Contraseña incorrecta. Te quedan <strong>${data.attempts_remaining}</strong> intento(s) antes del bloqueo.`;
                    errEl.style.display = 'block';
                    btn.disabled = false;
                    btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Ingresar';
                }
            } else {
                errEl.textContent = data.message || e.message || 'Credenciales incorrectas.';
                errEl.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Ingresar';
            }
        }
    }

    function _startLockoutCountdown(seconds, errEl, btn) {
        if (_lockoutInterval) clearInterval(_lockoutInterval);
        btn.disabled = true;
        let remaining = Math.max(0, Math.round(seconds));

        const fmt = s => `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
        errEl.innerHTML = `ðŸ”’ Cuenta bloqueada. Podrás intentar en <strong id="_cd">${fmt(remaining)}</strong>`;
        errEl.style.display = 'block';

        _lockoutInterval = setInterval(() => {
            remaining--;
            const el = document.getElementById('_cd');
            if (el) el.textContent = fmt(remaining);
            if (remaining <= 0) {
                clearInterval(_lockoutInterval);
                _lockoutInterval = null;
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Ingresar';
                errEl.style.display = 'none';
            }
        }, 1000);
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
