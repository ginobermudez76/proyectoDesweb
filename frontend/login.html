<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ingresar — Sistema de Incidencias</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
<div class="login-container">
    <div class="login-logo">📍</div>
    <div class="login-title">Bienvenido</div>
    <div class="login-subtitle">Sistema de Incidencias Georreferenciadas</div>

    <div id="error-msg" class="error-msg"></div>

    <div class="form-group">
        <label class="form-label" for="correo">Correo electrónico</label>
        <input class="form-input" id="correo" type="email" placeholder="tu@correo.com" autocomplete="email">
    </div>
    <div class="form-group">
        <label class="form-label" for="password">Contraseña</label>
        <input class="form-input" id="password" type="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn-orange mt-2" id="loginBtn" onclick="doLogin()">
        <i class="bi bi-box-arrow-in-right"></i> Ingresar
    </button>
</div>

<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script>
    if (getToken()) window.location.href = dashboardUrl('');

    async function doLogin() {
        const btn   = document.getElementById('loginBtn');
        const errEl = document.getElementById('error-msg');
        const correo = document.getElementById('correo').value.trim();
        const pass   = document.getElementById('password').value;

        errEl.style.display = 'none';
        if (!correo || !pass) {
            errEl.textContent = 'Completa todos los campos.';
            errEl.style.display = 'block';
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<i class="bi bi-arrow-clockwise"></i> Ingresando…';

        try {
            const data = await apiFetch('/login', {
                method: 'POST',
                body: JSON.stringify({ correo_electronico: correo, password: pass })
            });
            saveAuth(data.access_token, data.usuario);
            window.location.href = dashboardUrl('');
        } catch (e) {
            errEl.textContent = e.message || 'Credenciales incorrectas.';
            errEl.style.display = 'block';
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Ingresar';
        }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
