<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Usuarios — Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">
    <style>
        .user-card {
            background:#fff; border-radius:14px; padding:14px 16px;
            margin-bottom:10px; display:flex; align-items:center; gap:12px;
            box-shadow:0 1px 3px rgba(0,0,0,.06);
        }
        .user-avatar {
            width:44px; height:44px; border-radius:50%;
            display:flex; align-items:center; justify-content:center;
            font-size:16px; font-weight:700; color:#fff; flex-shrink:0;
        }
        .role-badge {
            display:inline-block; padding:2px 10px; border-radius:20px;
            font-size:10px; font-weight:700; letter-spacing:.3px;
        }
        .role-ADMIN      { background:#EDE9FE; color:#5B21B6; }
        .role-SUPERVISOR { background:#FEF3C7; color:#92400E; }
        .role-TECNICO    { background:#DBEAFE; color:#1D4ED8; }
        .role-CIUDADANO  { background:#D1FAE5; color:#065F46; }
        .toggle-btn {
            padding:6px 12px; border-radius:8px; border:1.5px solid;
            font-size:12px; font-weight:600; cursor:pointer; background:#fff;
        }
        .toggle-active   { border-color:#EF4444; color:#EF4444; }
        .toggle-inactive { border-color:var(--green); color:var(--green); }
    </style>
</head>
<body>
<div class="app-container">

    <div class="app-header">
        <button class="back-btn" onclick="history.back()"><i class="bi bi-chevron-left"></i></button>
        <h5>Usuarios y roles</h5>
        <div></div>
    </div>

    <!-- Filtro por rol -->
    <div class="filter-tabs">
        <button class="filter-tab active" data-filter="todos"      onclick="setFiltro(this)">Todos</button>
        <button class="filter-tab"        data-filter="ADMIN"      onclick="setFiltro(this)">Admin</button>
        <button class="filter-tab"        data-filter="SUPERVISOR" onclick="setFiltro(this)">Supervisor</button>
        <button class="filter-tab"        data-filter="TECNICO"    onclick="setFiltro(this)">Técnico</button>
    </div>

    <div class="section">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
            <div class="section-title" style="margin-bottom:0" id="countLabel">Usuarios</div>
            <button class="btn-orange" style="width:auto;padding:8px 16px;font-size:13px;border-radius:10px"
                onclick="nuevoUsuario()">
                <i class="bi bi-plus"></i> Nuevo
            </button>
        </div>
        <div id="lista"><div class="text-muted-sm text-center py-3">Cargando…</div></div>
    </div>

</div>

<nav class="bottom-nav">
    <a href="panel.html"><i class="bi bi-house"></i>Inicio</a>
    <a href="usuarios.html" class="active"><i class="bi bi-people-fill"></i>Usuarios</a>
    <a href="#"><i class="bi bi-shield-lock"></i>RBAC</a>
    <a href="perfil.html"><i class="bi bi-person"></i>Perfil</a>
</nav>

<!-- Modal nuevo usuario -->
<div id="modalOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;align-items:flex-end">
    <div style="background:#fff;border-radius:20px 20px 0 0;padding:24px;width:100%;max-width:430px;margin:0 auto;max-height:85vh;overflow-y:auto">
        <div style="font-size:16px;font-weight:700;margin-bottom:16px">Nuevo usuario</div>
        <div class="form-group">
            <label class="form-label">Nombres *</label>
            <input class="form-input" id="newNombres" placeholder="Ej: Carlos">
        </div>
        <div class="form-group">
            <label class="form-label">Apellidos *</label>
            <input class="form-input" id="newApellidos" placeholder="Ej: Méndez">
        </div>
        <div class="form-group">
            <label class="form-label">Correo electrónico *</label>
            <input class="form-input" id="newCorreo" type="email" placeholder="correo@ejemplo.com">
        </div>
        <div class="form-group">
            <label class="form-label">Nombre de usuario (opcional)</label>
            <input class="form-input" id="newUsuario" placeholder="Ej: carlos.mendez">
        </div>
        <div class="form-group">
            <label class="form-label">Contraseña temporal *</label>
            <input class="form-input" id="newPass" type="password" placeholder="Mínimo 8 caracteres">
        </div>
        <div class="form-group">
            <label class="form-label">Rol del usuario *</label>
            <select class="form-input" id="newRol" style="background-color: #fff;">
                <option value="ADMIN">Administrador</option>
                <option value="SUPERVISOR">Supervisor</option>
                <option value="TECNICO">Técnico</option>
                <option value="CIUDADANO">Ciudadano</option>
            </select>
        </div>
        <div id="modalError" class="error-msg" style="display:none;color:#EF4444;font-size:12px;margin-bottom:10px"></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px">
            <button class="btn-outline-gray" onclick="cerrarModal()">Cancelar</button>
            <button class="btn-orange" style="border-radius:12px" onclick="crearUsuario()">Crear</button>
        </div>
    </div>
</div>

<!-- Modal editar usuario -->
<div id="editModalOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;align-items:flex-end">
    <div style="background:#fff;border-radius:20px 20px 0 0;padding:24px;width:100%;max-width:430px;margin:0 auto;max-height:85vh;overflow-y:auto">
        <div style="font-size:16px;font-weight:700;margin-bottom:16px">Editar usuario</div>
        <input type="hidden" id="editId">
        <div class="form-group">
            <label class="form-label">Nombres *</label>
            <input class="form-input" id="editNombres">
        </div>
        <div class="form-group">
            <label class="form-label">Apellidos *</label>
            <input class="form-input" id="editApellidos">
        </div>
        <div class="form-group">
            <label class="form-label">Correo electrónico *</label>
            <input class="form-input" id="editCorreo" type="email">
        </div>
        <div class="form-group">
            <label class="form-label">Nombre de usuario</label>
            <input class="form-input" id="editUsuario">
        </div>
        <div class="form-group">
            <label class="form-label">Nueva contraseña (opcional)</label>
            <input class="form-input" id="editPass" type="password" placeholder="Dejar en blanco para no cambiar">
        </div>
        <div class="form-group">
            <label class="form-label">Rol del usuario *</label>
            <select class="form-input" id="editRol" style="background-color: #fff;">
                <option value="ADMIN">Administrador</option>
                <option value="SUPERVISOR">Supervisor</option>
                <option value="TECNICO">Técnico</option>
                <option value="CIUDADANO">Ciudadano</option>
            </select>
        </div>
        <div id="editModalError" class="error-msg" style="display:none;color:#EF4444;font-size:12px;margin-bottom:10px"></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px">
            <button class="btn-outline-gray" onclick="cerrarEdicion()">Cancelar</button>
            <button class="btn-orange" style="border-radius:12px" onclick="guardarEdicion()">Guardar</button>
        </div>
    </div>
</div>

<script src="../js/app.js"></script>
<script src="../js/auth.js"></script>
<script>
if (!requireAdmin()) throw new Error('Redirigiendo');

const AVATAR_COLORS = { ADMIN:'#5B21B6', SUPERVISOR:'#92400E', TECNICO:'#1D4ED8', CIUDADANO:'#065F46' };

let usuarios = [];
let filtroActual = 'todos';
let DB_ROLES = [];

async function cargar() {
    try {
        usuarios = await apiFetch('/usuarios');
        DB_ROLES = await apiFetch('/roles');
        renderRolesSelects();
        renderLista();
    } catch (err) {
        document.getElementById('lista').innerHTML = `<div class="text-danger text-center py-3">Error al cargar usuarios: ${err.message}</div>`;
    }
}

function renderRolesSelects() {
    const selectNew = document.getElementById('newRol');
    const selectEdit = document.getElementById('editRol');
    if (!selectNew || !selectEdit) return;
    const optionsHtml = DB_ROLES.map(r => `<option value="${r.codigo}">${r.nombre_rol}</option>`).join('');
    selectNew.innerHTML = optionsHtml;
    selectEdit.innerHTML = optionsHtml;
}

function setFiltro(btn) {
    document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filtroActual = btn.dataset.filter;
    renderLista();
}

function filtrar(lista) {
    if (filtroActual === 'todos') return lista;
    return lista.filter(u => u.roles?.[0]?.codigo === filtroActual);
}

function renderLista() {
    const lista = filtrar(usuarios);
    document.getElementById('countLabel').textContent = `Usuarios (${lista.length})`;
    document.getElementById('lista').innerHTML = lista.map(u => {
        const rol = u.roles?.[0];
        const initials = ((u.nombres||'?')[0] + (u.apellidos||'')[0]).toUpperCase();
        const color = AVATAR_COLORS[rol?.codigo] || '#9CA3AF';
        return `
        <div class="user-card">
            <div class="user-avatar" style="background:${color}">${initials}</div>
            <div style="flex:1;min-width:0">
                <div style="font-size:14px;font-weight:600;color:var(--gray-900)">
                    ${u.nombres} ${u.apellidos}
                </div>
                <div class="text-muted-sm" style="margin-bottom:4px">${u.correo_electronico}</div>
                ${rol ? `<span class="role-badge role-${rol.codigo}">${rol.nombre_rol}</span>` : ''}
            </div>
            <div style="display:flex;flex-direction:column;gap:6px">
                <button class="toggle-btn" style="border-color:#6B7280;color:#6B7280"
                    onclick="abrirEdicion('${u.uuid}')">
                    Editar
                </button>
                <button class="toggle-btn ${u.activo ? 'toggle-active' : 'toggle-inactive'}"
                    onclick="toggleActivo('${u.uuid}')">
                    ${u.activo ? 'Desactivar' : 'Activar'}
                </button>
            </div>
        </div>`;
    }).join('') || '<div class="text-muted-sm text-center py-3">Sin usuarios en este filtro.</div>';
}

async function toggleActivo(uuid) {
    try {
        await apiFetch(`/usuarios/${uuid}/toggle`, { method: 'PATCH' });
        await cargar();
    } catch (err) {
        alert(err.message || 'Error al cambiar el estado del usuario.');
    }
}

function abrirEdicion(uuid) {
    const u = usuarios.find(x => x.uuid === uuid);
    if (!u) return;
    document.getElementById('editId').value = u.uuid;
    document.getElementById('editNombres').value = u.nombres || '';
    document.getElementById('editApellidos').value = u.apellidos || '';
    document.getElementById('editCorreo').value = u.correo_electronico || '';
    document.getElementById('editUsuario').value = u.nombre_usuario || '';
    document.getElementById('editPass').value = '';
    document.getElementById('editRol').value = u.roles?.[0]?.codigo || 'CIUDADANO';
    document.getElementById('editModalOverlay').style.display = 'flex';
}

function cerrarEdicion() {
    document.getElementById('editModalOverlay').style.display = 'none';
    document.getElementById('editModalError').style.display = 'none';
}

async function guardarEdicion() {
    const errEl = document.getElementById('editModalError');
    errEl.style.display = 'none';

    const uuid = document.getElementById('editId').value;
    const nombres = document.getElementById('editNombres').value.trim();
    const apellidos = document.getElementById('editApellidos').value.trim();
    const correo_electronico = document.getElementById('editCorreo').value.trim();
    const nombre_usuario = document.getElementById('editUsuario').value.trim();
    const password = document.getElementById('editPass').value;
    const rol_codigo = document.getElementById('editRol').value;

    if (!nombres || !apellidos || !correo_electronico) {
        errEl.textContent = 'Por favor, completa todos los campos obligatorios.';
        errEl.style.display = 'block';
        return;
    }

    try {
        await apiFetch(`/usuarios/${uuid}`, {
            method: 'PUT',
            body: JSON.stringify({
                nombres,
                apellidos,
                correo_electronico,
                nombre_usuario: nombre_usuario || null,
                password: password || null,
                rol_codigo,
            })
        });
        cerrarEdicion();
        await cargar();
    } catch (err) {
        errEl.textContent = err.message || 'Error al editar el usuario.';
        errEl.style.display = 'block';
    }
}

function nuevoUsuario() {
    document.getElementById('newNombres').value = '';
    document.getElementById('newApellidos').value = '';
    document.getElementById('newCorreo').value = '';
    document.getElementById('newUsuario').value = '';
    document.getElementById('newPass').value = '';
    if (DB_ROLES.length > 0) {
        document.getElementById('newRol').value = DB_ROLES[0].codigo;
    }
    document.getElementById('modalError').style.display = 'none';
    document.getElementById('modalOverlay').style.display = 'flex';
}

function cerrarModal() {
    document.getElementById('modalOverlay').style.display = 'none';
    document.getElementById('modalError').style.display = 'none';
}

async function crearUsuario() {
    const errEl = document.getElementById('modalError');
    errEl.style.display = 'none';

    const nombres = document.getElementById('newNombres').value.trim();
    const apellidos = document.getElementById('newApellidos').value.trim();
    const correo_electronico = document.getElementById('newCorreo').value.trim();
    const password = document.getElementById('newPass').value;
    const rol_codigo = document.getElementById('newRol').value;
    const nombre_usuario = document.getElementById('newUsuario').value.trim();

    if (!nombres || !apellidos || !correo_electronico || !password) {
        errEl.textContent = 'Por favor, completa todos los campos obligatorios.';
        errEl.style.display = 'block';
        return;
    }

    try {
        await apiFetch('/usuarios', {
            method: 'POST',
            body: JSON.stringify({
                nombres,
                apellidos,
                correo_electronico,
                password,
                rol_codigo,
                nombre_usuario: nombre_usuario || null
            })
        });

        // Limpiar inputs
        document.getElementById('newNombres').value = '';
        document.getElementById('newApellidos').value = '';
        document.getElementById('newCorreo').value = '';
        document.getElementById('newPass').value = '';
        document.getElementById('newUsuario').value = '';
        if (DB_ROLES.length > 0) {
            document.getElementById('newRol').value = DB_ROLES[0].codigo;
        }

        cerrarModal();
        await cargar();
    } catch (err) {
        errEl.textContent = err.message || 'Error al crear el usuario.';
        errEl.style.display = 'block';
    }
}

cargar();
</script>
</body>
</html>
