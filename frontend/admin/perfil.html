<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mi Perfil — Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">
</head>
<body>
<div class="app-container">

    <div class="app-header" style="justify-content:center;border-bottom:none"><h5>Mi Perfil</h5></div>

    <div class="section" style="text-align:center;padding-top:8px">
        <div class="avatar-circle" id="avatarEl" style="background:#5B21B6">?</div>
        <div style="font-size:18px;font-weight:700;color:var(--gray-900)" id="nombreEl">…</div>
        <div class="text-muted-sm">Administrador del sistema</div>
    </div>

    <div class="section" style="padding-top:0">
        <div class="menu-list">
            <a class="menu-item" href="usuarios.html">
                <div class="menu-left"><i class="bi bi-people lead"></i> Usuarios y roles</div>
                <i class="bi bi-chevron-right arrow"></i>
            </a>
            <a class="menu-item">
                <div class="menu-left"><i class="bi bi-shield-lock lead"></i> Permisos RBAC</div>
                <i class="bi bi-chevron-right arrow"></i>
            </a>
            <a class="menu-item">
                <div class="menu-left"><i class="bi bi-journal-text lead"></i> Auditoría del sistema</div>
                <i class="bi bi-chevron-right arrow"></i>
            </a>
            <a class="menu-item">
                <div class="menu-left"><i class="bi bi-key lead"></i> Cambiar contraseña</div>
                <i class="bi bi-chevron-right arrow"></i>
            </a>
        </div>
    </div>

    <div class="section" style="padding-top:0">
        <button class="btn-red" onclick="logout('../')">
            <i class="bi bi-box-arrow-right"></i> Cerrar sesión
        </button>
    </div>

</div>

<nav class="bottom-nav">
    <a href="panel.html"><i class="bi bi-house"></i>Inicio</a>
    <a href="usuarios.html"><i class="bi bi-people"></i>Usuarios</a>
    <a href="#"><i class="bi bi-shield-lock"></i>RBAC</a>
    <a href="perfil.html" class="active"><i class="bi bi-person-fill"></i>Perfil</a>
</nav>

<script src="../js/app.js"></script>
<script src="../js/auth.js"></script>
<script>
if (!requireAdmin()) throw new Error('Redirigiendo');
document.getElementById('avatarEl').textContent = getUserInitials();
document.getElementById('nombreEl').textContent  = getUserName();
</script>
</body>
</html>
