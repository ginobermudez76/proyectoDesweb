<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Panel — Administrador</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">
    <style>
        .stat-card {
            background:#fff; border-radius:14px; padding:16px;
            display:flex; align-items:center; gap:14px;
            box-shadow:0 1px 3px rgba(0,0,0,.06);
        }
        .stat-card .icon-circle {
            width:48px; height:48px; border-radius:12px;
            display:flex; align-items:center; justify-content:center;
            font-size:22px; flex-shrink:0;
        }
        .stat-card .val { font-size:24px; font-weight:700; color:var(--gray-900); }
        .stat-card .lbl { font-size:12px; color:var(--gray-400); }
    </style>
</head>
<body>
<div class="app-container">

    <div class="greeting-header">
        <div>
            <div class="greeting-text">Administrador del sistema</div>
            <div class="greeting-name" id="userName">…</div>
        </div>
        <i class="bi bi-gear" style="font-size:22px;color:var(--gray-400)"></i>
    </div>

    <!-- Stats del sistema -->
    <div class="section">
        <div class="section-title">Resumen del sistema</div>
        <div style="display:flex;flex-direction:column;gap:10px">

            <div class="stat-card">
                <div class="icon-circle" style="background:#FFF7ED">
                    <i class="bi bi-exclamation-circle" style="color:var(--orange)"></i>
                </div>
                <div>
                    <div class="val" id="totalInc">—</div>
                    <div class="lbl">Total de incidencias</div>
                </div>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
                <div class="stat-card">
                    <div class="icon-circle" style="background:#FEE2E2">
                        <i class="bi bi-fire" style="color:#EF4444"></i>
                    </div>
                    <div><div class="val" id="urgentesEl">—</div><div class="lbl">Urgentes</div></div>
                </div>
                <div class="stat-card">
                    <div class="icon-circle" style="background:#D1FAE5">
                        <i class="bi bi-check-circle" style="color:var(--green)"></i>
                    </div>
                    <div><div class="val" id="resueltasEl">—</div><div class="lbl">Resueltas</div></div>
                </div>
                <div class="stat-card">
                    <div class="icon-circle" style="background:#DBEAFE">
                        <i class="bi bi-clock" style="color:var(--blue)"></i>
                    </div>
                    <div><div class="val" id="pendientesEl">—</div><div class="lbl">Pendientes</div></div>
                </div>
                <div class="stat-card">
                    <div class="icon-circle" style="background:#FED7AA">
                        <i class="bi bi-arrow-repeat" style="color:var(--orange)"></i>
                    </div>
                    <div><div class="val" id="procesoEl">—</div><div class="lbl">En proceso</div></div>
                </div>
            </div>
        </div>
    </div>

    <div class="divider"></div>

    <!-- Acciones del sistema -->
    <div class="section">
        <div class="section-title">Gestión del sistema</div>
        <div class="menu-list">
            <a class="menu-item" href="usuarios.html">
                <div class="menu-left"><i class="bi bi-people lead"></i> Usuarios y roles</div>
                <i class="bi bi-chevron-right arrow"></i>
            </a>
            <a class="menu-item">
                <div class="menu-left"><i class="bi bi-shield-lock lead"></i> Permisos RBAC</div>
                <i class="bi bi-chevron-right arrow"></i>
            </a>
            <a class="menu-item">
                <div class="menu-left"><i class="bi bi-journal-text lead"></i> Auditoría</div>
                <i class="bi bi-chevron-right arrow"></i>
            </a>
            <a class="menu-item">
                <div class="menu-left"><i class="bi bi-bar-chart-line lead"></i> Reportes globales</div>
                <i class="bi bi-chevron-right arrow"></i>
            </a>
        </div>
    </div>

    <div class="section" style="padding-top:0">
        <button class="btn-red" onclick="logout('../')">
            <i class="bi bi-box-arrow-right"></i> Cerrar sesión
        </button>
    </div>

</div>

<nav class="bottom-nav">
    <a href="panel.html" class="active"><i class="bi bi-house-fill"></i>Inicio</a>
    <a href="usuarios.html"><i class="bi bi-people"></i>Usuarios</a>
    <a href="#"><i class="bi bi-shield-lock"></i>RBAC</a>
    <a href="perfil.html"><i class="bi bi-person"></i>Perfil</a>
</nav>

<script src="../js/app.js"></script>
<script src="../js/auth.js"></script>
<script>
if (!requireAdmin()) throw new Error('Redirigiendo');
document.getElementById('userName').textContent = getUserName();

async function cargarStats() {
    try {
        const data = await apiFetch('/incidencias');
        document.getElementById('totalInc').textContent    = data.length;
        document.getElementById('urgentesEl').textContent  = data.filter(i => i.prioridad === 'Urgente').length;
        document.getElementById('resueltasEl').textContent = data.filter(i => i.estado === 'Resuelta').length;
        document.getElementById('pendientesEl').textContent= data.filter(i => i.estado === 'Pendiente').length;
        document.getElementById('procesoEl').textContent   = data.filter(i => i.estado === 'En Proceso').length;
    } catch {}
}
cargarStats();
</script>
</body>
</html>
