<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mapa — Administrador</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">
    <style>
        body { padding-bottom:0; }
        .map-wrap { position:relative; height:calc(100vh - 62px); }
        #map { width:100%; height:100%; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="map-wrap">
        <div id="map"></div>
        <div class="map-legend">
            <div style="font-weight:600;font-size:11px;margin-bottom:4px">Estado</div>
            <div><span class="legend-dot" style="background:#3B82F6"></span>Recibido</div>
            <div><span class="legend-dot" style="background:#F97316"></span>En proceso</div>
            <div><span class="legend-dot" style="background:#22C55E"></span>Resuelto</div>
            <div><span class="legend-dot" style="background:#EF4444"></span>Rechazado</div>
        </div>
    </div>
</div>

<nav class="bottom-nav">
    <a href="panel.html"><i class="bi bi-house"></i>Inicio</a>
    <a href="mapa.html" class="active"><i class="bi bi-map-fill"></i>Mapa</a>
    <a href="#"><i class="bi bi-bell"></i>Alertas</a>
    <a href="perfil.html"><i class="bi bi-person"></i>Perfil</a>
</nav>

<script src="../js/app.js"></script>
<script src="../js/auth.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
if (!requireAdmin()) throw new Error('Redirigiendo');

const ESTADO_COLOR = { 'Pendiente':'#3B82F6', 'En Proceso':'#F97316', 'Resuelta':'#22C55E', 'Rechazada':'#EF4444' };

const map = L.map('map').setView([19.4326, -99.1332], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution:'© OpenStreetMap' }).addTo(map);

if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
        map.setView([pos.coords.latitude, pos.coords.longitude], 13);
    });
}

async function cargar() {
    try {
        const data = await apiFetch('/incidencias');
        data.forEach(inc => {
            if (!inc.ubicacion?.coordinates) return;
            const [lng, lat] = inc.ubicacion.coordinates;
            const color = ESTADO_COLOR[inc.estado] || '#9CA3AF';
            const e = estadoInfo(inc.estado);
            L.circleMarker([lat,lng], { radius:11, color:'#fff', fillColor:color, fillOpacity:0.9, weight:2 })
                .addTo(map)
                .bindPopup(`<b>${inc.titulo}</b><br>${e.label}<br>${inc.prioridad || 'Media'}<br><a href="detalle.html?id=${inc.id}">Ver →</a>`);
        });
    } catch {}
}

cargar();
</script>
</body>
</html>
