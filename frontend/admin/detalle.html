<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Detalle — Administrador</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">
    <style>
        .readonly-estado {
            display:flex; gap:8px;
        }
        .readonly-estado .status-btn { cursor:default; pointer-events:none; }
    </style>
</head>
<body>
<div class="app-container">

    <div class="app-header">
        <button class="back-btn" onclick="history.back()"><i class="bi bi-chevron-left"></i></button>
        <h5>Detalle de incidencia</h5>
        <div></div>
    </div>

    <div id="content"><div class="text-muted-sm text-center py-5">Cargando…</div></div>

</div>

<script src="../js/app.js"></script>
<script src="../js/auth.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
if (!requireAdmin()) throw new Error('Redirigiendo');

const id = new URLSearchParams(window.location.search).get('id');
if (!id) window.location.href = 'panel.html';

async function cargar() {
    try {
        const d = await apiFetch(`/incidencias/${id}`);
        render(d);
    } catch {
        document.getElementById('content').innerHTML =
            '<div class="section text-muted-sm">No se pudo cargar la incidencia.</div>';
    }
}

function render({ incidencia: inc, historial_seguimiento, comentarios }) {
    const p = prioridadInfo(inc.prioridad);
    const e = estadoInfo(inc.estado);
    const tResol = tiempoResolucion(inc.fecha_creacion, historial_seguimiento);
    const hasCoords = inc.ubicacion?.coordinates;

    document.getElementById('content').innerHTML = `
    <div class="detail-layout">

        <!-- COLUMNA IZQUIERDA: mapa + ubicación + asignación -->
        <div class="detail-left">
            ${hasCoords ? `
            <div class="section" style="padding-bottom:8px">
                <div class="map-mini" id="detalleMap"></div>
            </div>
            <div class="section" style="padding-top:0;padding-bottom:8px">
                <div class="location-row">
                    <div class="loc-text">
                        <i class="bi bi-geo-alt-fill" style="color:var(--orange)"></i>
                        ${inc.ubicacion.coordinates[1].toFixed(5)}, ${inc.ubicacion.coordinates[0].toFixed(5)}
                    </div>
                </div>
            </div>` : ''}

            <div class="section">
                <div class="section-title">Técnico asignado</div>
                <div class="assigned-row">
                    <div style="display:flex;align-items:center">
                        ${inc.asignado_a
                            ? `<div class="assigned-avatar">T</div>
                               <span style="font-size:14px;font-weight:500;word-break:break-all">Técnico: ${inc.asignado_a}</span>`
                            : `<span class="text-muted-sm">Sin asignar</span>`}
                    </div>
                    <button class="btn-cambiar" onclick="reasignar()">
                        <i class="bi bi-person-plus"></i> ${inc.asignado_a ? 'Reasignar' : 'Asignar'}
                    </button>
                </div>
            </div>
        </div>

        <!-- COLUMNA DERECHA: info + estado + historial + notas -->
        <div class="detail-right">
            <div class="section" style="padding-bottom:8px">
                <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
                    <span style="font-size:18px;font-weight:700;color:var(--gray-900)">${inc.titulo}</span>
                    <span class="badge-status ${p.badgeCls}">${inc.prioridad || 'Media'}</span>
                </div>
                <div class="text-muted-sm">Reportado ${timeAgo(inc.fecha_creacion)}</div>
                ${tResol ? `<div class="text-muted-sm" style="margin-top:4px"><i class="bi bi-clock-history"></i> Resuelto en ${tResol}</div>` : ''}
            </div>

            <div class="section">
                <div class="section-title">Descripción</div>
                <p style="font-size:14px;color:var(--gray-600);margin:0;line-height:1.5">${inc.descripcion || 'Sin descripción.'}</p>
            </div>

            <!-- Botones de Cambio de Estado (Supervisor / Admin) -->
            <div class="section">
                <div class="section-title">Cambiar estado</div>
                <div class="readonly-estado">
                    <button class="status-btn ${inc.estado === 'Pendiente' ? 'active' : ''}" id="btnSup0" onclick="selEstado('Pendiente')">Recibida</button>
                    <button class="status-btn ${inc.estado === 'En Proceso' ? 'active' : ''}" id="btnSup1" onclick="selEstado('En Proceso')">En proceso</button>
                    <button class="status-btn ${inc.estado === 'Resuelta' ? 'active' : ''}" id="btnSup2" onclick="selEstado('Resuelta')">Resuelta</button>
                </div>
                
                ${inc.estado === 'Resuelta' ? `
                <div class="mt-3">
                    <button class="btn-red w-100" onclick="rechazarResolucion()">
                        <i class="bi bi-x-circle"></i> Rechazar resolución del técnico
                    </button>
                </div>
                ` : `
                <div class="mt-3">
                    <textarea class="form-input" id="notaInput" rows="2" placeholder="Nota u observación del cambio de estado..."></textarea>
                    <button class="btn-orange w-100 mt-2" onclick="guardarEstado()">
                        <i class="bi bi-check2-circle"></i> Guardar cambio de estado
                    </button>
                </div>
                `}
            </div>

            <!-- Notas de seguimiento (Comentarios) -->
            <div class="section">
                <div class="section-title">Notas de seguimiento</div>
                <div class="timeline" id="comentariosList">
                    ${comentarios.length ? comentarios.map(c => `
                        <div class="timeline-item">
                            <div class="time">${timeAgo(c.created_at)}</div>
                            <div class="text">${c.texto}</div>
                        </div>
                    `).join('') : '<div class="text-muted-sm">Sin notas de seguimiento.</div>'}
                </div>
            </div>

            <!-- Historial de Auditoría/Seguimiento -->
            <div class="section">
                <div class="section-title">Historial de estados</div>
                <div class="timeline">
                    ${historial_seguimiento.length ? historial_seguimiento.map(h => `
                        <div class="timeline-item">
                            <div class="time">${timeAgo(h.fecha_hora)}</div>
                            <div class="text">
                                Cambió a <b>${h.estado_nuevo}</b><br>
                                <span class="text-muted-sm">${h.observacion || ''}</span>
                            </div>
                        </div>
                    `).join('') : '<div class="text-muted-sm">Sin cambios de estado.</div>'}
                </div>
            </div>
            
            <div class="section" style="padding-top:0">
                <button class="btn-red w-100" onclick="eliminarIncidencia()">
                    <i class="bi bi-trash"></i> Eliminar Incidencia
                </button>
            </div>
        </div>

    </div>
    `;

    if (hasCoords) {
        initMap(inc.ubicacion.coordinates);
    }
}

let estadoActual = null;

function selEstado(e) {
    estadoActual = e;
    cargar(); // re-render con nuevo estado seleccionado
}

async function guardarEstado() {
    if (!estadoActual) return;
    const nota = document.getElementById('notaInput')?.value.trim() || '';
    try {
        await apiFetch(`/incidencias/${id}/estado`, {
            method: 'POST',
            body: JSON.stringify({ estado_nuevo: estadoActual, observacion: nota || 'Actualizado por administrador (sin técnico asignado).' })
        });
        cargar();
    } catch (e) { alert(e.message || 'Error al actualizar estado.'); }
}

async function rechazarResolucion() {
    if (!confirm('¿Rechazar la resolución del técnico y devolver a "En proceso"?')) return;
    const motivo = prompt('Motivo del rechazo (opcional):') || 'Resolución rechazada por administrador.';
    try {
        await apiFetch(`/incidencias/${id}/estado`, {
            method: 'POST',
            body: JSON.stringify({ estado_nuevo: 'En Proceso', observacion: motivo })
        });
        await apiFetch(`/incidencias/${id}/comentarios`, {
            method: 'POST',
            body: JSON.stringify({ texto: `⚠️ Resolución rechazada por administrador: ${motivo}` })
        });
        cargar();
    } catch (e) { alert(e.message || 'Error al rechazar.'); }
}

async function reasignar() {
    const nuevoId = prompt('UUID del técnico a asignar:');
    if (!nuevoId) return;
    try {
        await apiFetch(`/incidencias/${id}`, {
            method: 'PUT',
            body: JSON.stringify({ asignado_a: nuevoId })
        });
        cargar();
    } catch (e) { alert(e.message || 'Error al reasignar.'); }
}

async function eliminarIncidencia() {
    if (!confirm('¿Eliminar esta incidencia permanentemente?')) return;
    try {
        await apiFetch(`/incidencias/${id}`, { method: 'DELETE' });
        window.location.href = 'panel.html';
    } catch (e) { alert(e.message || 'Error al eliminar.'); }
}

function initMap([lng, lat]) {
    const m = L.map('detalleMap', { zoomControl:false, dragging:false, scrollWheelZoom:false });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution:'© OSM' }).addTo(m);
    m.setView([lat, lng], 15);
    L.marker([lat, lng]).addTo(m);
}

cargar();
</script>
</body>
</html>
