<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mi Perfil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">
</head>
<body>
<div class="app-container">

    <div class="app-header" style="justify-content:center;border-bottom:none">
        <h5>Mi Perfil</h5>
    </div>

    <div class="section" style="text-align:center;padding-top:8px">
        <div class="avatar-circle" id="avatarEl">?</div>
        <div style="font-size:18px;font-weight:700;color:var(--gray-900)" id="nombreEl">…</div>
        <div class="text-muted-sm" id="correoEl">…</div>
    </div>

    <!-- Estadísticas -->
    <div class="card-white mx-3 mb-3">
        <div class="profile-stats">
            <div class="stat-item">
                <div class="stat-value" id="totalEl">—</div>
                <div class="stat-label">Reportes enviados</div>
            </div>
            <div class="stat-item">
                <div class="stat-value green" id="resueltosEl">—</div>
                <div class="stat-label">Resueltos</div>
            </div>
        </div>
    </div>

    <!-- Menú -->
    <div class="section" style="padding-top:0">
        <div class="menu-list">
            <a class="menu-item">
                <div class="menu-left">
                    <i class="bi bi-person lead"></i> Mis datos personales
                </div>
                <i class="bi bi-chevron-right arrow"></i>
            </a>
            <a class="menu-item" href="home.html">
                <div class="menu-left">
                    <i class="bi bi-file-text lead"></i> Mis reportes
                </div>
                <i class="bi bi-chevron-right arrow"></i>
            </a>
            <a class="menu-item">
                <div class="menu-left">
                    <i class="bi bi-bell lead"></i> Notificaciones
                </div>
                <i class="bi bi-chevron-right arrow"></i>
            </a>
            <a class="menu-item">
                <div class="menu-left">
                    <i class="bi bi-question-circle lead"></i> Ayuda y soporte
                </div>
                <i class="bi bi-chevron-right arrow"></i>
            </a>
        </div>
    </div>

    <div class="section" style="padding-top:0">
        <button class="btn-red" onclick="logout('../')">
            <i class="bi bi-box-arrow-right"></i> Cerrar sesión
        </button>
    </div>

</div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
    <a href="home.html"><i class="bi bi-house"></i>Inicio</a>
    <a href="mapa.html"><i class="bi bi-map"></i>Mapa</a>
    <a href="#"><i class="bi bi-file-text"></i>Reportes</a>
    <a href="perfil.html" class="active"><i class="bi bi-person-fill"></i>Perfil</a>
</nav>

<script src="../js/app.js"></script>
<script src="../js/auth.js"></script>
<script>
if (!requireCiudadano()) throw new Error('Redirigiendo');

const u = getUser();
document.getElementById('avatarEl').textContent = getUserInitials();
document.getElementById('nombreEl').textContent = getUserName();
document.getElementById('correoEl').textContent = u?.correo_electronico || '';

async function cargarStats() {
    try {
        const data = await apiFetch('/incidencias');
        const mis = data.filter(i => String(i.usuario_id) === String(u.id));
        const resueltos = mis.filter(i => i.estado === 'Resuelta').length;
        document.getElementById('totalEl').textContent = mis.length;
        document.getElementById('resueltosEl').textContent = resueltos;
    } catch {}
}

cargarStats();
</script>
</body>
</html>
