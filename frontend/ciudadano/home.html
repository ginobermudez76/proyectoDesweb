<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Inicio — Ciudadano</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">
</head>
<body>
<div class="app-container">

    <!-- Header -->
    <div class="greeting-header">
        <div>
            <div class="greeting-text">Hola,</div>
            <div class="greeting-name" id="userName">...</div>
        </div>
        <i class="bi bi-bell" style="font-size:22px;color:var(--gray-400)"></i>
    </div>

    <!-- Mini mapa con ubicación -->
    <div class="section" style="padding-bottom:0">
        <div class="map-mini" id="miniMap"></div>
    </div>

    <!-- CTA Reportar -->
    <div class="section">
        <button class="btn-orange" onclick="window.location.href='reportar.html'">
            <i class="bi bi-plus-circle"></i> Reportar incidencia
        </button>
    </div>

    <!-- Mis reportes -->
    <div class="section" style="padding-top:0">
        <div class="section-title">Mis reportes</div>
        <div id="reportesList">
            <div class="text-muted-sm text-center py-3">Cargando reportes…</div>
        </div>
    </div>

</div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
    <a href="home.html" class="active"><i class="bi bi-house-fill"></i>Inicio</a>
    <a href="mapa.html"><i class="bi bi-map"></i>Mapa</a>
    <a href="#"><i class="bi bi-file-text"></i>Reportes</a>
    <a href="perfil.html"><i class="bi bi-person"></i>Perfil</a>
</nav>

<script src="../js/app.js"></script>
<script src="../js/auth.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
if (!requireCiudadano()) throw new Error('Redirigiendo');

document.getElementById('userName').textContent = getUserName();

// Mini mapa - ubicación del usuario
const miniMap = L.map('miniMap', { zoomControl: false, dragging: false, scrollWheelZoom: false });
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OSM' }).addTo(miniMap);
miniMap.setView([19.4326, -99.1332], 13);

if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
        const ll = [pos.coords.latitude, pos.coords.longitude];
        miniMap.setView(ll, 14);
        L.circleMarker(ll, { radius: 8, color: '#F97316', fillColor: '#F97316', fillOpacity: 1, weight: 2 })
            .addTo(miniMap)
            .bindPopup('Tu ubicación');
    });
}

// Cargar mis reportes
async function cargarReportes() {
    const user = getUser();
    try {
        const data = await apiFetch('/incidencias');
        // Filtrar por usuario actual
        const mis = data.filter(i => String(i.usuario_id) === String(user.id));
        showNotifBadge(mis.filter(i => i.estado !== 'Pendiente').length);
        renderReportes(mis);
    } catch (e) {
        document.getElementById('reportesList').innerHTML =
            '<div class="text-muted-sm text-center py-3">No se pudieron cargar los reportes.</div>';
    }
}

function renderReportes(lista) {
    const el = document.getElementById('reportesList');
    if (!lista.length) {
        el.innerHTML = '<div class="text-muted-sm text-center py-3">Aún no tienes reportes.</div>';
        return;
    }
    el.innerHTML = lista.map(i => {
        const e = estadoInfo(i.estado);
        return `
        <div class="incident-card" onclick="window.location.href='detalle.html?id=${i.id}'">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
                <span style="font-size:14px;font-weight:600;color:var(--gray-900)">${i.titulo}</span>
                <span class="badge-status ${e.cls}">${e.label}</span>
            </div>
            <div class="text-muted-sm" style="margin-bottom:8px">
                <i class="bi bi-geo-alt" style="font-size:11px"></i>
                ${i.ubicacion ? 'Ver en mapa' : 'Sin ubicación'} · ${timeAgo(i.fecha_creacion)}
            </div>
            <div class="progress-3step">${progressBars(i.estado)}</div>
        </div>`;
    }).join('');
}

cargarReportes();
</script>
</body>
</html>
