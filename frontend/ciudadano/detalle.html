<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Detalle del reporte</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">
</head>
<body>
<div class="app-container">

    <div class="app-header">
        <button class="back-btn" onclick="history.back()"><i class="bi bi-chevron-left"></i></button>
        <h5>Detalle del reporte</h5>
        <div></div>
    </div>

    <div id="content">
        <div class="text-muted-sm text-center py-5">Cargando…</div>
    </div>

</div>

<script src="../js/app.js"></script>
<script src="../js/auth.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
if (!requireCiudadano()) throw new Error('Redirigiendo');

const id = new URLSearchParams(window.location.search).get('id');
if (!id) window.location.href = 'home.html';

let detalleMap = null;

async function cargar() {
    try {
        const d = await apiFetch(`/incidencias/${id}`);
        render(d);
    } catch (e) {
        document.getElementById('content').innerHTML =
            `<div class="section text-muted-sm">No se pudo cargar el reporte.</div>`;
    }
}

function render({ incidencia: inc, evidencias, historial_seguimiento, comentarios }) {
    const e = estadoInfo(inc.estado);
    const step = e.step;
    const esPropio = String(inc.usuario_id) === String(getUser()?.uuid);
    const tResol = tiempoResolucion(inc.fecha_creacion, historial_seguimiento);

    const seguimientoHTML = buildTimeline(historial_seguimiento, inc.estado);
    const comentariosHTML = buildComentarios(comentarios);
    const hasCoords = inc.ubicacion && inc.ubicacion.coordinates;

    document.getElementById('content').innerHTML = `
    <div class="detail-layout">

        <!-- COLUMNA IZQUIERDA: mapa + ubicación + progreso -->
        <div class="detail-left">
            <div class="section" style="padding-bottom:8px">
                <div class="map-mini" id="detalleMap" style="${!hasCoords ? 'display:none' : ''}"></div>
            </div>

            ${hasCoords ? `
            <div class="section" style="padding-top:0;padding-bottom:8px">
                <div class="location-row">
                    <div class="loc-text">
                        <i class="bi bi-geo-alt-fill" style="color:var(--orange)"></i>
                        ${inc.ubicacion.coordinates[1].toFixed(5)}, ${inc.ubicacion.coordinates[0].toFixed(5)}
                    </div>
                </div>
            </div>` : ''}

            <div class="section" style="padding-top:8px">
                <div class="section-title">Progreso</div>
                <div class="progress-3step" style="margin-top:12px">${progressBars(inc.estado)}</div>
            </div>
        </div>

        <!-- COLUMNA DERECHA: info + seguimiento + descripción + comentarios -->
        <div class="detail-right">
            <div class="section" style="padding-bottom:8px">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
                    <span style="font-size:18px;font-weight:700;color:var(--gray-900)">${inc.titulo}</span>
                    <div style="display:flex;align-items:center;gap:8px">
                        <span class="badge-status ${e.cls}">${e.label}</span>
                        ${esPropio && inc.estado === 'Pendiente' ? `<button class="btn btn-sm btn-outline-secondary" onclick="toggleEdit()"><i class="bi bi-pencil"></i></button>` : ''}
                    </div>
                </div>
                <div class="text-muted-sm">Reportado el ${formatDate(inc.fecha_creacion)}</div>
                ${tResol ? `<div class="text-muted-sm" style="margin-top:4px"><i class="bi bi-clock-history"></i> Resuelto en ${tResol}</div>` : ''}
                ${esPropio && inc.estado === 'Pendiente' ? `
                <div id="editForm" style="display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--gray-200)">
                    <div class="form-group">
                        <label class="form-label">Descripción</label>
                        <textarea class="form-input" id="editDesc" rows="3">${inc.descripcion || ''}</textarea>
                    </div>
                    <div class="form-group" style="margin-top:8px">
                        <label class="form-label">Prioridad</label>
                        <select class="form-input" id="editPrioridad">
                            ${['Baja','Media','Alta','Urgente'].map(p => `<option ${inc.prioridad === p ? 'selected' : ''}>${p}</option>`).join('')}
                        </select>
                    </div>
                    <div style="display:flex;gap:8px;margin-top:8px">
                        <button class="btn btn-primary" style="flex:1" onclick="guardarEdicion()">Guardar</button>
                        <button class="btn btn-outline-secondary" style="flex:1" onclick="toggleEdit()">Cancelar</button>
                    </div>
                </div>` : ''}
            </div>

            <div class="divider"></div>

            <div class="section">
                <div class="section-title">Seguimiento</div>
                <div class="timeline">${seguimientoHTML}</div>
            </div>

            <div class="divider"></div>

            <div class="section">
                <div class="section-title">Descripción</div>
                <p style="font-size:14px;color:#4B5563;line-height:1.6">${inc.descripcion || '—'}</p>
            </div>

            ${buildEvidencias(evidencias)}

            <div class="divider"></div>

            <div class="section">
                <div class="section-title">Actualizaciones</div>
                ${comentariosHTML}
            </div>

            ${esPropio ? `
            <div class="section" style="padding-top:0">
                <hr style="border-color:var(--gray-200);margin:0 0 16px">
                <button class="btn btn-outline-danger w-100" onclick="eliminarReporte()">
                    <i class="bi bi-trash"></i> Eliminar este reporte
                </button>
            </div>` : ''}
        </div>

    </div>
    `;

    if (hasCoords) initMap(inc.ubicacion.coordinates);
}

function buildTimeline(historial, estadoActual) {
    const steps = [
        { key: 'Pendiente',  label: 'Recibido',   desc: 'Tu reporte fue registrado en el sistema' },
        { key: 'En Proceso', label: 'En proceso',  desc: 'Un operador fue asignado y está atendiendo el caso' },
        { key: 'Resuelta',   label: 'Resuelto',    desc: 'Se confirmará cuando se complete la reparación' },
    ];

    const currentStep = estadoInfo(estadoActual).step;

    return steps.map((s, i) => {
        const done = i <= currentStep;
        const fechaEntry = historial?.find(h =>
            (i === 0 && h.estado_anterior === null) ||
            (i === 1 && h.estado_nuevo === 'En Proceso') ||
            (i === 2 && h.estado_nuevo === 'Resuelta')
        );
        const fecha = done && fechaEntry ? formatDate(fechaEntry.fecha_cambio) : (i === 0 ? 'Al reportar' : 'Pendiente');

        return `
        <div class="timeline-item">
            <div class="timeline-dot ${done ? 'done' : 'pending'}">
                ${done ? '<i class="bi bi-check"></i>' : ''}
            </div>
            <div class="timeline-title">${s.label}</div>
            <div class="timeline-date">${fecha}</div>
            <div class="timeline-desc">${done ? s.desc : s.desc}</div>
        </div>`;
    }).join('');
}

function buildComentarios(comentarios) {
    if (!comentarios || !comentarios.length) {
        return '<div class="text-muted-sm">Sin actualizaciones aún.</div>';
    }
    return comentarios.map(c => `
        <div style="margin-bottom:14px">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
                <i class="bi bi-person-circle" style="color:var(--gray-400)"></i>
                <span style="font-size:13px;font-weight:600;color:var(--gray-700)">Operador</span>
                <span class="text-muted-sm">· ${timeAgo(c.fecha_creacion)}</span>
            </div>
            <div style="font-size:13px;color:#4B5563">${c.texto}</div>
        </div>
    `).join('');
}

function initMap([lng, lat]) {
    detalleMap = L.map('detalleMap', { zoomControl: false, dragging: false, scrollWheelZoom: false });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OSM' }).addTo(detalleMap);
    detalleMap.setView([lat, lng], 15);
    L.marker([lat, lng]).addTo(detalleMap);
}

function formatDate(d) {
    if (!d) return '—';
    return new Date(d).toLocaleString('es-MX', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });
}

function toggleEdit() {
    const f = document.getElementById('editForm');
    if (f) f.style.display = f.style.display === 'none' ? '' : 'none';
}

async function guardarEdicion() {
    const desc = document.getElementById('editDesc')?.value.trim();
    const prio = document.getElementById('editPrioridad')?.value;
    if (!desc) return;
    try {
        await apiFetch(`/incidencias/${id}`, {
            method: 'PUT',
            body: JSON.stringify({ descripcion: desc, prioridad: prio })
        });
        cargar();
    } catch (e) { alert(e.message || 'Error al guardar.'); }
}

async function eliminarReporte() {
    if (!confirm('¿Eliminar este reporte? Esta acción no se puede deshacer.')) return;
    try {
        await apiFetch(`/incidencias/${id}`, { method: 'DELETE' });
        window.location.href = 'home.html';
    } catch (e) { alert(e.message || 'Error al eliminar el reporte.'); }
}

function buildEvidencias(evidencias) {
    if (!evidencias || !evidencias.length) return '';
    return `
    <div class="divider"></div>
    <div class="section">
        <div class="section-title">Evidencia adjunta</div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:8px">
            ${evidencias.map(e => `
                <a href="${e.ruta}" target="_blank" style="border:1.5px solid var(--gray-200);border-radius:10px;overflow:hidden;width:100px;height:100px;display:inline-block">
                    <img src="${e.ruta}" alt="${e.nombre_archivo}" style="width:100%;height:100%;object-fit:cover">
                </a>
            `).join('')}
        </div>
    </div>`;
}

cargar();
</script>
</body>
</html>
