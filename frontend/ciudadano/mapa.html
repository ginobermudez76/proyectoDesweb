<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mapa — Incidencias</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link href="../css/style.css" rel="stylesheet">
    <style>
        body { padding-bottom: 0; }
        .map-wrap { position: relative; height: calc(100vh - 62px); }
        #map { width: 100%; height: 100%; }
    </style>
</head>
<body>
<div class="app-container">

    <div class="map-wrap">
        <div id="map"></div>

        <!-- Leyenda -->
        <div class="map-legend">
            <div><span class="legend-dot" style="background:#3B82F6"></span>Recibido</div>
            <div><span class="legend-dot" style="background:#F97316"></span>En proceso</div>
            <div><span class="legend-dot" style="background:#22C55E"></span>Resuelto</div>
        </div>

        <!-- CTA -->
        <div style="position:absolute;bottom:16px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);z-index:10">
            <button class="btn-orange" onclick="window.location.href='reportar.html'">
                <i class="bi bi-plus-circle"></i> Reportar incidencia
            </button>
        </div>
    </div>

</div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
    <a href="home.html"><i class="bi bi-house"></i>Inicio</a>
    <a href="mapa.html" class="active"><i class="bi bi-map-fill"></i>Mapa</a>
    <a href="#"><i class="bi bi-file-text"></i>Reportes</a>
    <a href="perfil.html"><i class="bi bi-person"></i>Perfil</a>
</nav>

<script src="../js/app.js"></script>
<script src="../js/auth.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
if (!requireCiudadano()) throw new Error('Redirigiendo');

const COLORES = {
    'Pendiente':  '#3B82F6',
    'En Proceso': '#F97316',
    'Resuelta':   '#22C55E',
    'Rechazada':  '#EF4444',
};

const map = L.map('map').setView([19.4326, -99.1332], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);

if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
        const ll = [pos.coords.latitude, pos.coords.longitude];
        map.setView(ll, 14);
        L.circleMarker(ll, { radius: 8, color: '#fff', fillColor: '#3B82F6', fillOpacity: 1, weight: 2 })
            .addTo(map).bindPopup('Tu ubicación');
    });
}

async function cargarIncidencias() {
    try {
        const data = await apiFetch('/incidencias');
        data.forEach(inc => {
            if (!inc.ubicacion || !inc.ubicacion.coordinates) return;
            const [lng, lat] = inc.ubicacion.coordinates;
            const color = COLORES[inc.estado] || '#9CA3AF';
            const e = estadoInfo(inc.estado);
            L.circleMarker([lat, lng], { radius: 10, color: '#fff', fillColor: color, fillOpacity: 0.9, weight: 2 })
                .addTo(map)
                .bindPopup(`<b>${inc.titulo}</b><br>${e.label}<br><a href="detalle.html?id=${inc._id}">Ver detalle →</a>`);
        });
    } catch {}
}

cargarIncidencias();
</script>
</body>
</html>
